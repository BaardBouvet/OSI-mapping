openapi: "3.0.3"
info:
  title: CRM API
  version: "1.0.0"
  description: CRM system — company records

paths:
  /companies:
    get:
      summary: List companies
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
  /contacts:
    get:
      summary: List contacts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
  /orders:
    get:
      summary: List orders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"


components:
  schemas:
    Company:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
          description: CRM company identifier
        name:
          type: string
          description: Company display name
        account_number:
          type: string
          description: Customer account number (custom field)
        customer_toggle:
          type: boolean
          description: CRM toggle indicating whether this company is a customer
        contact_associations:
          type: array
          description: Contact associations nested on this company
          items:
            $ref: "#/components/schemas/ContactAssociation"
        updated_at:
          type: string
          format: date-time
          description: Last modification timestamp
    Contact:
      type: object
      required: [id, firstname, lastname, email]
      properties:
        id:
          type: integer
          description: CRM contact identifier
        firstname:
          type: string
          description: Contact first name
        lastname:
          type: string
          description: Contact last name
        email:
          type: string
          format: email
          description: Contact email
        updated_at:
          type: string
          format: date-time
          description: Last modification timestamp
    ContactAssociation:
      type: object
      description: A contact linked to a company, with one or more roles
      required: [contact_id, roles]
      properties:
        contact_id:
          type: integer
          description: CRM contact identifier
        roles:
          type: array
          description: Roles this contact holds for the parent company
          items:
            type: string
            description: "Relation type (e.g. primary-contact, billing, technical)"
    Order:
      type: object
      required: [id, company_id, order_number]
      properties:
        id:
          type: integer
          description: CRM order identifier
        company_id:
          type: integer
          description: CRM company identifier (the buyer)
        order_number:
          type: string
          description: Human-readable order number
        status:
          type: string
          description: "Order status (e.g. open, closed, cancelled)"
        created_at:
          type: string
          format: date-time
          description: Order creation timestamp
