# yaml-language-server: $schema=../specs/osi-mapping-schema.json

# CRM companies → canonical company.
# Demonstrates: OpenAPI source, source_field, default_timestamp_field.

version: "1.0"

mappings:
  - name: companies_to_company
    description: CRM companies to canonical company
    id: id

    source:
      schema_file: ./crm-openapi.yaml
      schema_path: "#/components/schemas/Company"
      schema_format: openapi

    target:
      semantic_model: acme_model
      dataset: company
      model_file: ./model-acme.yaml

    default_timestamp_field: updated_at

    field_mappings:
      - target_field: name
        source_field: name
        priority: 2

      - target_field: account
        source_field: account_number

      - target_field: is_customer
        source_field: customer_toggle

  - name: contacts_to_person
    description: CRM contacts to canonical person
    id: id

    source:
      schema_file: ./crm-openapi.yaml
      schema_path: "#/components/schemas/Contact"
      schema_format: openapi

    target:
      semantic_model: acme_model
      dataset: person
      model_file: ./model-acme.yaml

    default_timestamp_field: updated_at

    field_mappings:
      - target_field: person_id
        source_field: id

      - target_field: firstname
        source_field: firstname

      - target_field: lastname
        source_field: lastname

      - target_field: email
        source_field: email

  - name: company_contacts_to_company_person
    description: CRM company–contact associations to canonical company_person
    id: [parent_company_id, parent_contact_id, role]

    source:
      schema_file: ./crm-openapi.yaml
      schema_path: "#/components/schemas/Company"
      schema_format: openapi

    target:
      semantic_model: acme_model
      dataset: company_person
      model_file: ./model-acme.yaml

    source_path: contact_associations.roles
    scalar_field: role

    parent_fields:
      parent_company_id:
        field: id
      parent_contact_id:
        path: contact_associations
        field: contact_id
      parent_updated_at:
        field: updated_at

    default_timestamp_field: parent_updated_at

    field_mappings:
      - target_field: company_id
        source_field: parent_company_id

      - target_field: person_id
        source_field: parent_contact_id

      - target_field: relation_type
        source_field: role

  - name: orders_to_company
    description: CRM orders assign customer role with static is_customer
    id: company_id
    embedded: true

    source:
      schema_file: ./crm-openapi.yaml
      schema_path: "#/components/schemas/Order"
      schema_format: openapi

    target:
      semantic_model: acme_model
      dataset: company
      model_file: ./model-acme.yaml

    field_mappings:
      - target_field: is_customer
        expression_forward:
          dialects:
            - dialect: ANSI_SQL
              expression: "TRUE"

  - name: orders_to_order
    description: CRM orders to canonical order
    id: id

    source:
      schema_file: ./crm-openapi.yaml
      schema_path: "#/components/schemas/Order"
      schema_format: openapi

    target:
      semantic_model: acme_model
      dataset: order
      model_file: ./model-acme.yaml

    default_timestamp_field: created_at

    field_mappings:
      - target_field: order_id
        source_field: id

      - target_field: company_id
        source_field: company_id

      - target_field: order_number
        source_field: order_number

      - target_field: status
        source_field: status

      - target_field: created_at
        source_field: created_at
