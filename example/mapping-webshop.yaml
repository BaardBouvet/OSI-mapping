# yaml-language-server: $schema=../specs/osi-mapping-schema.json

# Webshop API orders → canonical order, order_line, order_discount, product.
#
# Demonstrates flat nesting:
#   - source_path: maps array items as top-level mappings
#   - parent_fields: pulls parent-level fields into scope as aliases
#   - routing: filter_forward on line_type discriminates product vs discount
#   - embedded: product info denormalized in product lines → product dataset

version: "1.0"

mappings:

  # --- Parent-level Order fields ---

  - name: api_orders_to_order
    description: Webshop API orders — parent scalar fields
    id: order_id

    source:
      schema_file: ./webshop-openapi.yaml
      schema_path: "#/components/schemas/Order"
      schema_format: openapi

    target:
      semantic_model: acme_inc_model
      dataset: order
      model_file: ./model-acme.yaml

    field_mappings:
      - target_field: order_id
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: order_id
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: order_id

      - target_field: customer_name
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: customer_name
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: customer_name

      - target_field: total
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: total
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: total

  # --- Product lines → order_line (routing by line_type) ---

  - name: api_orders_to_order_line
    description: Route product line items from Order.lines[] into order_line
    id: line_num

    source:
      schema_file: ./webshop-openapi.yaml
      schema_path: "#/components/schemas/Order"
      schema_format: openapi

    source_path: lines

    parent_fields:
      parent_order_id:
        path: ""
        field: order_id

    target:
      semantic_model: acme_inc_model
      dataset: order_line
      model_file: ./model-acme.yaml

    filter_forward:
      dialects:
        - dialect: ANSI_SQL
          expression: "line_type = 'product'"

    field_mappings:
      - target_field: order_ref
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: parent_order_id
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: order_ref

      - target_field: line_num
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: line_num
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: line_num

      - target_field: product_id
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: product_id
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: product_id

      - target_field: quantity
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: quantity
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: quantity

      - target_field: unit_price
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: unit_price
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: unit_price

  # --- Discount lines → order_discount (routing by line_type) ---

  - name: api_orders_to_order_discount
    description: Route discount line items from Order.lines[] into order_discount
    id: line_num

    source:
      schema_file: ./webshop-openapi.yaml
      schema_path: "#/components/schemas/Order"
      schema_format: openapi

    source_path: lines

    parent_fields:
      parent_order_id:
        path: ""
        field: order_id

    target:
      semantic_model: acme_inc_model
      dataset: order_discount
      model_file: ./model-acme.yaml

    filter_forward:
      dialects:
        - dialect: ANSI_SQL
          expression: "line_type = 'discount'"

    field_mappings:
      - target_field: order_ref
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: parent_order_id
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: order_ref

      - target_field: line_num
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: line_num
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: line_num

      - target_field: discount_code
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: discount_code
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: discount_code

      - target_field: amount
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: amount
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: amount

  # --- Embedded product info from product lines → product ---

  - name: api_orders_to_product
    description: Extract denormalized product info from product line items
    embedded: true
    id: product_id

    source:
      schema_file: ./webshop-openapi.yaml
      schema_path: "#/components/schemas/Order"
      schema_format: openapi

    source_path: lines

    target:
      semantic_model: acme_inc_model
      dataset: product
      model_file: ./model-acme.yaml

    filter_forward:
      dialects:
        - dialect: ANSI_SQL
          expression: "line_type = 'product'"

    field_mappings:
      - target_field: product_id
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: product_id
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: product_id

      - target_field: product_name
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: product_name
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: product_name

      - target_field: product_category
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: product_category
