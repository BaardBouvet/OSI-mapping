# yaml-language-server: $schema=../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: acme_model
    description: Acme Inc canonical model — merge target

    datasets:
      - name: company
        source: canonical.public.company
        primary_key: [company_id]
        unique_keys:
          - [company_id]
        description: Merged company entity from CRM and ERP

        fields:
          - name: company_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_id
            description: Canonical company identifier (generated by tooling)

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            description: Company name (COALESCE — ERP wins)

          - name: account
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: account
            description: Customer account number (COALESCE)

          - name: is_customer
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: is_customer
            description: Customer flag (ERP static true, CRM toggle)

      - name: person
        source: canonical.public.person
        primary_key: [person_id]
        unique_keys:
          - [person_id]
        description: Canonical contacts linked to companies

        fields:
          - name: person_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: person_id
            description: Canonical person identifier

          - name: firstname
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: "COALESCE(firstname, SPLIT_PART(fullname, ' ', 1))"
            description: Contact first name

          - name: lastname
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: "COALESCE(lastname, SPLIT_PART(fullname, ' ', 2))"
            description: Contact last name

          - name: fullname
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: "COALESCE(fullname, CONCAT(firstname, ' ', lastname))"
            description: Contact full name

          - name: email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: email
            description: Contact email

      - name: company_person
        source: canonical.public.company_person
        primary_key: [company_id, person_id]
        unique_keys:
          - [company_id, person_id]
        description: Association between companies and persons with relation type

        fields:
          - name: company_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_id
            description: Canonical company identifier

          - name: person_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: person_id
            description: Canonical person identifier

          - name: relation_type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: relation_type
            description: "Relation type (e.g. primary-contact, billing, technical)"

    relationships:
      - name: company_person_to_company
        from: company_person
        to: company
        from_columns: [company_id]
        to_columns: [company_id]

      - name: company_person_to_person
        from: company_person
        to: person
        from_columns: [person_id]
        to_columns: [person_id]
