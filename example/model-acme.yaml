# yaml-language-server: $schema=../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: acme_inc_model
    description: Acme Inc canonical company model — merge target

    datasets:
      - name: company
        source: canonical.public.company
        primary_key: [company_id]
        unique_keys:
          - [company_id]
        description: Merged company entity from multiple sources

        fields:
          - name: company_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_id
            description: Canonical company identifier (generated by tooling)

          - name: email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: email
            description: Contact email addresses (array after COLLECT)

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            description: Company name (LAST_MODIFIED wins)

          - name: account
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: account
            description: Account number (COALESCE by priority)

          - name: role
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: role
            description: Roles this company has (array after COLLECT, e.g. customer, supplier)

      - name: person
        source: canonical.public.person
        primary_key: [person_id]
        unique_keys:
          - [person_id]
        description: Person entity — single source, no resolution needed

        fields:
          - name: person_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: person_id
            description: Canonical person identifier

          - name: email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: email
            description: Person email

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            description: Person name

          - name: phone
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: phone
            description: Person phone number

          - name: role
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: role
            description: Roles this person has (e.g. customer)

      - name: address
        source: canonical.public.address
        primary_key: [address_id]
        unique_keys:
          - [address_id]
        description: Billing address extracted from CRM customer rows (embedded)

        fields:
          - name: address_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: address_id
            description: Address identifier (derived from parent source row)

          - name: street
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: street

          - name: city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: city

          - name: postal_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: postal_code

          - name: country
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: country

      - name: product
        source: canonical.public.product
        primary_key: [product_id]
        unique_keys:
          - [product_id]
        description: Product catalog — ERP is authoritative, webshop provides supplemental data

        fields:
          - name: product_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_id
            description: Product identifier

          - name: product_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_name

          - name: product_category
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_category

      - name: order
        source: canonical.public.order
        primary_key: [order_id]
        unique_keys:
          - [order_id]
        description: Orders from the webshop API

        fields:
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_id

          - name: customer_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_name

          - name: total
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: total

      - name: order_line
        source: canonical.public.order_line
        primary_key: [order_ref, line_num]
        unique_keys:
          - [order_ref, line_num]
        description: Product line items extracted from order lines[]

        fields:
          - name: order_ref
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_ref
            description: FK to order

          - name: line_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_num

          - name: product_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_id
            description: FK to product

          - name: quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: quantity

          - name: unit_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: unit_price

      - name: order_discount
        source: canonical.public.order_discount
        primary_key: [order_ref, line_num]
        unique_keys:
          - [order_ref, line_num]
        description: Discount line items extracted from order lines[]

        fields:
          - name: order_ref
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_ref
            description: FK to order

          - name: line_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_num

          - name: discount_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: discount_code

          - name: amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: amount

      - name: country
        source: canonical.public.country
        primary_key: [iso_code]
        unique_keys:
          - [iso_code]
        description: >
          Country reference entity — merged from ERP (Norwegian names)
          and CRM (English names) country_lookup tables. Both sources
          contribute rows that are linked by iso_code during resolution.
          Only iso_code is stored canonically; the source-side name
          ("Norge", "Norway") is the source identity used for FK tracing.

        fields:
          - name: iso_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: iso_code
            description: ISO 3166-1 alpha-2 code (e.g. NO) — primary key

    relationships:
      - name: address_to_country
        from: address
        to: country
        from_columns: [country]
        to_columns: [iso_code]

      - name: order_line_to_order
        from: order_line
        to: order
        from_columns: [order_ref]
        to_columns: [order_id]

      - name: order_line_to_product
        from: order_line
        to: product
        from_columns: [product_id]
        to_columns: [product_id]

      - name: order_discount_to_order
        from: order_discount
        to: order
        from_columns: [order_ref]
        to_columns: [order_id]

    metrics: []
