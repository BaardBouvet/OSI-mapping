# yaml-language-server: $schema=../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: acme_model
    description: Acme Inc canonical model — merge target

    datasets:
      - name: company
        source: canonical.public.company
        primary_key: [company_id]
        unique_keys:
          - [company_id]
        description: Merged company entity from CRM and ERP

        fields:
          - name: company_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_id
            description: Canonical company identifier (generated by tooling)

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            description: Company name (COALESCE — ERP wins)

          - name: email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: email
            description: Contact email (LAST_MODIFIED)

          - name: account
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: account
            description: Customer account number (COALESCE)
