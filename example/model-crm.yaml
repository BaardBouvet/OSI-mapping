# yaml-language-server: $schema=../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: crm_model
    description: CRM system — customer data

    datasets:
      - name: customers
        source: crm.public.customers
        primary_key: [id]
        unique_keys:
          - [id]
        description: Customer records from the CRM system

        fields:
          - name: id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: id
            description: CRM customer identifier

          - name: customer_email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_email
            description: Primary contact email

          - name: customer_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_name
            description: Customer display name

          - name: customer_account
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_account
            description: Account number

          - name: customer_phone
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_phone
            description: Contact phone number

          - name: customer_type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_type
            description: Contact type (person or company)

          - name: last_updated
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: last_updated
            description: Last update timestamp

          - name: billing_street
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: billing_street
            description: Billing address street

          - name: billing_city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: billing_city
            description: Billing address city

          - name: billing_postal_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: billing_postal_code
            description: Billing address postal code

          - name: billing_country
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: billing_country
            description: Billing address country (English name, e.g. "Norway")

      - name: country_lookup
        source: crm.public.country_lookup
        primary_key: [id]
        unique_keys:
          - [id]
          - [iso_code]
          - [name]
        description: Country reference table — maps English names to ISO codes

        fields:
          - name: id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: id
            description: Country lookup identifier

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            description: English country name (e.g. Norway)

          - name: iso_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: iso_code
            description: ISO 3166-1 alpha-2 code (e.g. NO)

    relationships:
      - name: customer_country
        from: customers
        to: country_lookup
        from_columns: [billing_country]
        to_columns: [name]

    metrics: []
