# yaml-language-server: $schema=../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: erp_model
    description: ERP system — customer master data

    datasets:
      - name: customers
        source: erp.dbo.customers
        primary_key: [id]
        unique_keys:
          - [id]
        description: Customer records from the ERP

        fields:
          - name: id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: id
            description: ERP customer identifier

          - name: customer_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_name
            description: Customer name

          - name: customer_email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_email
            description: Customer email

          - name: account_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: account_number
            description: Customer account number

          - name: contact_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: contact.name
            description: Embedded primary contact full name on the customer row

          - name: contact_email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: contact.email
            description: Embedded primary contact email on the customer row

          - name: modified_at
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: modified_at
            description: Last modification timestamp

      - name: customer_contacts
        source: erp.dbo.customers
        primary_key: [customer_id]
        unique_keys:
          - [customer_id]
        description: Embedded primary contact projected from the customer row

        fields:
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: id
            description: ERP customer identifier

          - name: contact_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: contact.name
            description: Embedded primary contact full name

          - name: contact_email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: contact.email
            description: Embedded primary contact email

          - name: modified_at
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: modified_at
            description: Last modification timestamp

    relationships:
      - name: customer_contacts_to_customers
        from: customer_contacts
        to: customers
        from_columns: [customer_id]
        to_columns: [id]
