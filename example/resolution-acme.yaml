# yaml-language-server: $schema=../specs/osi-resolution-schema.json

# Resolution rules for the Acme target model.
# Two sources (CRM + ERP) both map to company.
# name: COALESCE (ERP priority 1 wins).
# account: COLLECT with link (entity linking field).
# is_customer: COALESCE (ERP static TRUE wins when present; CRM toggle applies otherwise).
# Entity linking: companies linked by account, persons linked by email.
# company_person: relation_type uses COLLECT.
# person name fields: firstname/lastname/fullname resolve atomically.

version: "1.0"

resolutions:
  - name: company_resolution
    description: Resolution rules for the company dataset

    target:
      semantic_model: acme_model
      dataset: company
      model_file: ./model-acme.yaml

    fields:
      name:
        strategy:
          type: COALESCE

      account:
        strategy:
          type: COLLECT
          link: true

      is_customer:
        strategy:
          type: COALESCE

  - name: person_resolution
    description: Resolution rules for the person dataset

    target:
      semantic_model: acme_model
      dataset: person
      model_file: ./model-acme.yaml

    fields:
      firstname:
        strategy:
          type: LAST_MODIFIED

      lastname:
        strategy:
          type: LAST_MODIFIED

      fullname:
        strategy:
          type: LAST_MODIFIED

      email:
        strategy:
          type: COLLECT
          link: true

    atomic_groups:
      person_name:
        fields: [firstname, lastname, fullname]

  - name: company_person_resolution
    description: Resolution rules for the company_person link dataset

    target:
      semantic_model: acme_model
      dataset: company_person
      model_file: ./model-acme.yaml

    fields:
      relation_type:
        strategy:
          type: COLLECT
