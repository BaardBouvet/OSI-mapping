version: "1.0"
description: >
  Composite keys for order lines. Orders merge via external reference. Lines
  identified by (order_ref, line_number) tuple using link_group.

sources:
  crm_line_items:
    primary_key: line_item_id
  crm_orders:
    primary_key: order_number
  erp_order_lines:
    primary_key: [order_id, line_no]
  erp_orders:
    primary_key: order_id

targets:
  purchase_order:
    fields:
      external_order_ref:
        strategy: identity
      order_date:
        strategy: coalesce
      customer_name:
        strategy: coalesce
      status:
        strategy: last_modified

  order_line:
    fields:
      order_ref:
        strategy: coalesce
        references: purchase_order
      line_number:
        strategy: coalesce
      product_name:
        strategy: coalesce
      quantity:
        strategy: coalesce
        type: numeric
      unit_price:
        strategy: coalesce
        type: numeric

mappings:
  - name: erp_orders
    source: { dataset: erp_orders }
    target: purchase_order
    fields:
      - source: external_ref
        target: external_order_ref
      - source: order_date
        target: order_date
      - source: customer_name
        target: customer_name
      - source: status
        target: status
        last_modified: updated_at

  - name: erp_order_lines
    source: { dataset: erp_order_lines }
    target: order_line
    fields:
      - source: order_id
        target: order_ref
        references: erp_orders
      - source: line_no
        target: line_number
      - source: product_name
        target: product_name
      - source: quantity
        target: quantity
      - source: unit_price
        target: unit_price

  - name: crm_orders
    source: { dataset: crm_orders }
    target: purchase_order
    fields:
      - source: external_ref
        target: external_order_ref
      - source: order_date
        target: order_date
      - source: customer_name
        target: customer_name
      - source: status
        target: status
        last_modified: last_updated

  - name: crm_line_items
    source: { dataset: crm_line_items }
    target: order_line
    last_modified: modified_at
    fields:
      - source: order_ref
        target: order_ref
        references: crm_orders
      - source: product_name
        target: product_name
        last_modified: modified_at
      - source: quantity
        target: quantity
      - source: price
        target: unit_price

tests:
  - description: "Composite key — orders merge via external ref, lines preserved independently"
    input:
      erp_orders:
        - { order_id: "ORD-100", external_ref: "PO-2024-001", order_date: "2024-01-15", customer_name: "Acme Corp", status: "pending", updated_at: "2024-01-15T10:00:00Z" }
      erp_order_lines:
        - { order_id: "ORD-100", line_no: 1, product_name: "Widget A", quantity: 5, unit_price: 10.50 }
        - { order_id: "ORD-100", line_no: 2, product_name: "Widget B", quantity: 3, unit_price: 15.75 }
      crm_orders:
        - { order_number: "CRM-500", external_ref: "PO-2024-001", order_date: "2024-01-20", customer_name: "Acme Corp", status: "shipped", last_updated: "2024-01-20T10:00:00Z" }
      crm_line_items:
        - { line_item_id: "LI-1001", order_ref: "CRM-500", product_name: "Gadget X", quantity: 10, price: 25.00, modified_at: "2024-01-18T10:00:00Z" }
    expected:
      erp_orders:
        updates:
          - { order_id: "ORD-100", external_ref: "PO-2024-001", order_date: "2024-01-15", customer_name: "Acme Corp", status: "shipped" }
      erp_order_lines:
        inserts:
          - { _cluster_id: "crm_line_items:LI-1001", product_name: "Gadget X", quantity: 10, unit_price: 25 }
      crm_line_items:
        inserts:
          - _cluster_id: 'erp_order_lines:{"line_no": 1, "order_id": "ORD-100"}'
            order_ref: "CRM-500"
            product_name: "Widget A"
            quantity: 5
            price: 10.50
          - _cluster_id: 'erp_order_lines:{"line_no": 2, "order_id": "ORD-100"}'
            order_ref: "CRM-500"
            product_name: "Widget B"
            quantity: 3
            price: 15.75
