version: "1.0"
description: >
  Concurrent modification detection using include_base. Base columns in reverse
  output allow target systems to detect when data changed since last sync.

sources:
  companies:
    primary_key: id
  customers:
    primary_key: id

targets:
  company:
    fields:
      name:
        strategy: last_modified
      account:
        strategy: coalesce
      email:
        strategy: identity

mappings:
  - name: companies
    source: companies
    target: company
    fields:
      - source: company_email
        target: email
      - source: company_account
        target: account
        priority: 2
      - source: company_name
        target: name
        last_modified: modified_at

  - name: customers
    source: customers
    target: company
    reverse_filter: "account IS NOT NULL"
    fields:
      - source: customer_name
        target: name
        last_modified: last_updated
      - source: customer_account
        target: account
        priority: 1
      - source: customer_email
        target: email

tests:
  - description: "Base columns for optimistic locking — includes _base_ prefixed originals"
    input:
      companies:
        - { id: "C1", company_email: "acme@example.org", company_name: "Acme Inc", company_account: "A12", modified_at: "2024-06-02T12:00:00Z" }
      customers:
        - { id: "CU1", customer_email: "acme@example.org", customer_name: "Acme", customer_account: "A12345", last_updated: "2024-06-01T12:00:00Z" }
        - { id: "CU2", customer_email: "orphan@example.com", customer_name: "No Account", customer_account: null, last_updated: "2024-06-01T12:00:00Z" }
    expected:
      companies:
        updates:
          - { id: "C1", company_email: "acme@example.org", company_name: "Acme Inc", company_account: "A12345" }
        inserts:
          - { _cluster_id: "customers:CU2", company_email: "orphan@example.com", company_account: null, company_name: "No Account" }
      customers:
        updates:
          - { id: "CU1", customer_email: "acme@example.org", customer_name: "Acme Inc", customer_account: "A12345" }
        deletes:
          - { id: "CU2" }
