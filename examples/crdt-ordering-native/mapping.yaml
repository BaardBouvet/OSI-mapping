version: "1.0"
description: >
  Two recipe systems contribute steps for the same recipes.
  Blog CMS provides explicit CRDT-style order keys (`sort_key`) while
  Recipe DB is a plain ordered list (`order: true` with ordinality).
  Steps are matched by content identity and reconstructed in resolved order.

sources:
  recipe_db:
    primary_key: id
  blog_cms:
    primary_key: id

targets:
  recipe:
    fields:
      name:
        strategy: identity
      cuisine:
        strategy: coalesce

  recipe_step:
    fields:
      recipe_name:
        strategy: identity
        link_group: step_identity
      instruction:
        strategy: identity
        link_group: step_identity
      step_order:
        strategy: coalesce
      duration:
        strategy: coalesce

mappings:
  - name: recipe_db_recipes
    source: recipe_db
    target: recipe
    priority: 1
    fields:
      - source: id
        target: name
      - source: cuisine
        target: cuisine

  - name: blog_cms_recipes
    source: blog_cms
    target: recipe
    priority: 2
    fields:
      - source: id
        target: name
      - source: cuisine
        target: cuisine

  - name: recipe_db_steps
    source: recipe_db
    parent: recipe_db_recipes
    array: steps
    parent_fields:
      parent_recipe: id
    target: recipe_step
    priority: 1
    fields:
      - source: parent_recipe
        target: recipe_name
        references: recipe_db_recipes
      - target: step_order
        order: true
      - source: instruction
        target: instruction
      - source: duration
        target: duration

  - name: blog_cms_steps
    source: blog_cms
    parent: blog_cms_recipes
    array: steps
    parent_fields:
      parent_recipe: id
    target: recipe_step
    priority: 2
    fields:
      - source: parent_recipe
        target: recipe_name
        references: blog_cms_recipes
      - source: sort_key
        target: step_order
      - source: instruction
        target: instruction
      - source: duration
        target: duration

tests:
  - description: "CRDT-aware source + plain list source merge into a 5-step output"
    input:
      recipe_db:
        - id: "Chocolate Cake"
          cuisine: "French"
          steps:
            - instruction: "Preheat to 200°C"
              duration: "10"
            - instruction: "Mix dry ingredients"
              duration: "5"
            - instruction: "Sift flour"
              duration: "7"
            - instruction: "Bake 30 min"
              duration: "30"
      blog_cms:
        - id: "Chocolate Cake"
          cuisine: "Dessert"
          steps:
            - instruction: "Bake 30 min"
              sort_key: "a4"
            - instruction: "Mix dry ingredients"
              sort_key: "a2"
            - instruction: "Preheat to 200°C"
              sort_key: "a0"
            - instruction: "Grease the pan"
              sort_key: "a1"
    expected:
      recipe_db:
        updates:
          - id: "Chocolate Cake"
            cuisine: "French"
            steps:
              - instruction: "Preheat to 200°C"
                duration: "10"
              - instruction: "Grease the pan"
                duration: null
              - instruction: "Mix dry ingredients"
                duration: "5"
              - instruction: "Sift flour"
                duration: "7"
              - instruction: "Bake 30 min"
                duration: "30"
      blog_cms:
        updates:
          - id: "Chocolate Cake"
            cuisine: "French"
            steps:
              - instruction: "Preheat to 200°C"
                duration: "10"
                sort_key: "a0"
              - instruction: "Grease the pan"
                duration: null
                sort_key: "a1"
              - instruction: "Mix dry ingredients"
                duration: "5"
                sort_key: "a2"
              - instruction: "Sift flour"
                duration: "7"
                sort_key: "0000000002"
              - instruction: "Bake 30 min"
                duration: "30"
                sort_key: "a4"

  - description: "CRDT sort_key reorders shared steps and both sources receive reordered output"
    input:
      recipe_db:
        - id: "Chocolate Cake"
          cuisine: "French"
          steps:
            - instruction: "Preheat to 200°C"
              duration: "10"
            - instruction: "Mix dry ingredients"
              duration: "5"
            - instruction: "Sift flour"
              duration: "7"
            - instruction: "Bake 30 min"
              duration: "30"
      blog_cms:
        - id: "Chocolate Cake"
          cuisine: "Dessert"
          steps:
            - instruction: "Grease the pan"
              sort_key: "a3"
            - instruction: "Mix dry ingredients"
              sort_key: "a2"
            - instruction: "Preheat to 200°C"
              sort_key: "a0"
            - instruction: "Bake 30 min"
              sort_key: "a1"
    expected:
      recipe_db:
        updates:
          - id: "Chocolate Cake"
            cuisine: "French"
            steps:
              - instruction: "Preheat to 200°C"
                duration: "10"
              - instruction: "Bake 30 min"
                duration: "30"
              - instruction: "Mix dry ingredients"
                duration: "5"
              - instruction: "Sift flour"
                duration: "7"
              - instruction: "Grease the pan"
                duration: null
      blog_cms:
        updates:
          - id: "Chocolate Cake"
            cuisine: "French"
            steps:
              - instruction: "Preheat to 200°C"
                duration: "10"
                sort_key: "a0"
              - instruction: "Bake 30 min"
                duration: "30"
                sort_key: "a1"
              - instruction: "Mix dry ingredients"
                duration: "5"
                sort_key: "a2"
              - instruction: "Sift flour"
                duration: "7"
                sort_key: "0000000002"
              - instruction: "Grease the pan"
                duration: null
                sort_key: "a3"
