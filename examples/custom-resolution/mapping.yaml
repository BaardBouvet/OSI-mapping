version: "1.0"
description: >
  Custom SQL aggregation for conflict resolution. Products with the same SKU
  merge: max price, average rating, concatenated categories.

sources:
  catalog:
    primary_key: id

targets:
  product:
    fields:
      name:
        strategy: coalesce
      sku:
        strategy: identity
      category:
        strategy: expression
        expression: "string_agg(distinct category, ', ' order by category)"
      price:
        strategy: expression
        expression: "max(price)"
        type: numeric
      rating:
        strategy: expression
        expression: "avg(rating)"
        type: numeric

mappings:
  - name: catalog
    source: { dataset: catalog }
    target: product
    fields:
      - source: name
        target: name
      - source: sku
        target: sku
      - source: category
        target: category
      - source: price
        target: price
      - source: rating
        target: rating

tests:
  - description: "Duplicate SKUs aggregate with max/avg/string_agg"
    input:
      catalog:
        - { id: "CAT1", name: "Widget", sku: "SKU-001", category: "Electronics", price: 100, rating: 4.5 }
        - { id: "CAT2", name: "Widget", sku: "SKU-001", category: "Gadgets", price: 120, rating: 4.0 }
        - { id: "CAT3", name: "Device", sku: "SKU-002", category: "Electronics", price: 90, rating: 5.0 }
    expected:
      catalog:
        updates:
          - { id: "CAT1", name: "Widget", sku: "SKU-001", category: "Electronics, Gadgets", price: 120, rating: 4.25 }
          - { id: "CAT2", name: "Widget", sku: "SKU-001", category: "Electronics, Gadgets", price: 120, rating: 4.25 }
          - { id: "CAT3", name: "Device", sku: "SKU-002", category: "Electronics", price: 90, rating: 5.0 }
