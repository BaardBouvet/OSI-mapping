version: "1.0"
description: >
  Cross-source element-level deletion-wins via written state.
  Two sources contribute recipe steps.  When one source (blog_cms)
  removes a step, the engine compares that source's forward view against
  the previously-written JSONB in its parent's _written table.  The
  detected deletion propagates to ALL sources' deltas — even recipe_db
  (which still has the step) sees it removed from the reconstructed array.

sources:
  recipe_db:
    primary_key: id
  blog_cms:
    primary_key: id

targets:
  recipe:
    fields:
      name:
        strategy: identity
      cuisine:
        strategy: coalesce

  recipe_step:
    fields:
      recipe_name:
        strategy: identity
        link_group: step_identity
      instruction:
        strategy: identity
        link_group: step_identity
      step_order:
        strategy: coalesce
      duration:
        strategy: coalesce
      is_removed:
        strategy: bool_or
        type: boolean

mappings:
  - name: recipe_db_recipes
    source: recipe_db
    target: recipe
    fields:
      - source: id
        target: name
      - source: cuisine
        target: cuisine

  - name: recipe_db_steps
    source: recipe_db
    parent: recipe_db_recipes
    array: steps
    parent_fields:
      parent_recipe: id
    target: recipe_step
    fields:
      - source: parent_recipe
        target: recipe_name
        references: recipe_db_recipes
      - target: step_order
        order: true
      - source: instruction
        target: instruction
      - source: duration
        target: duration

  - name: blog_cms_recipes
    source: blog_cms
    target: recipe
    written_state: true
    derive_noop: true
    fields:
      - source: id
        target: name
      - source: cuisine
        target: cuisine

  - name: blog_cms_steps
    source: blog_cms
    parent: blog_cms_recipes
    array: steps
    parent_fields:
      parent_recipe: id
    target: recipe_step
    derive_tombstones: is_removed
    fields:
      - source: parent_recipe
        target: recipe_name
        references: blog_cms_recipes
      - target: step_order
        order: true
      - source: instruction
        target: instruction
      - source: duration
        target: duration

tests:
  - description: >
      Two sources contribute steps to "Chocolate Cake".
      blog_cms previously had 4 steps (recorded in written state) but
      now only has 3 — it removed "Sift flour".  recipe_db still has
      all 4.  Without deletion-wins, the resolved array keeps all 4
      and recipe_db's delta says 'noop'.  With deletion-wins, the
      engine detects blog_cms's removal (in written but not in forward
      view) and excludes "Sift flour" from recipe_db's reconstructed
      array — producing 'update' with only 3 steps.
    input:
      recipe_db:
        - id: "Chocolate Cake"
          cuisine: "French"
          steps:
            - instruction: "Preheat"
              duration: "10"
            - instruction: "Sift flour"
              duration: "7"
            - instruction: "Mix"
              duration: "5"
            - instruction: "Bake"
              duration: "30"
      blog_cms:
        - id: "Chocolate Cake"
          cuisine: "Dessert"
          steps:
            - instruction: "Preheat"
              duration: "10"
            - instruction: "Mix"
              duration: "5"
            - instruction: "Bake"
              duration: "30"
      _written_blog_cms_recipes:
        - _cluster_id: "blog_cms_recipes:Chocolate Cake"
          _written: '{"id": "Chocolate Cake", "cuisine": "Dessert", "steps": [{"instruction": "Preheat", "step_order": "0000000000", "duration": "10"}, {"instruction": "Sift flour", "step_order": "0000000001", "duration": "7"}, {"instruction": "Mix", "step_order": "0000000002", "duration": "5"}, {"instruction": "Bake", "step_order": "0000000003", "duration": "30"}]}'
    expected:
      recipe_db:
        updates:
          - id: "Chocolate Cake"
            cuisine: "French"
            steps:
              - instruction: "Preheat"
                duration: "10"
              - instruction: "Mix"
                duration: "5"
              - instruction: "Bake"
                duration: "30"
      blog_cms:
        updates:
          - id: "Chocolate Cake"
            cuisine: "French"
            steps:
              - instruction: "Preheat"
                duration: "10"
              - instruction: "Mix"
                duration: "5"
              - instruction: "Bake"
                duration: "30"
