version: "1.0"
description: >
  Two sources contribute line items to the same order.  The child target
  declares elements: coalesce so the highest-priority source's entire
  set of elements wins per parent — elements from losing sources are
  excluded, not merged.

sources:
  shop:
    primary_key: order_id
  warehouse_orders:
    primary_key: order_number
  warehouse_lines:
    primary_key: line_id

targets:
  purchase_order:
    fields:
      order_ref:
        strategy: identity

  order_line:
    elements: coalesce
    fields:
      order_ref:
        strategy: identity
        references: purchase_order
        link_group: line_id
      line_number:
        strategy: identity
        type: numeric
        link_group: line_id
      product:
        strategy: coalesce
      quantity:
        strategy: coalesce
        type: numeric

mappings:
  - name: shop_orders
    source: shop
    target: purchase_order
    fields:
      - source: order_id
        target: order_ref

  - name: shop_lines
    parent: shop_orders
    array: lines
    parent_fields:
      parent_order_id: order_id
    target: order_line
    priority: 2
    fields:
      - source: parent_order_id
        target: order_ref
        references: shop_orders
      - source: line_num
        target: line_number
      - source: item
        target: product
      - source: qty
        target: quantity

  - name: warehouse_orders
    source: warehouse_orders
    target: purchase_order
    fields:
      - source: order_number
        target: order_ref

  - name: warehouse_lines
    source: warehouse_lines
    target: order_line
    priority: 1
    fields:
      - source: order_number
        target: order_ref
        references: warehouse_orders
      - source: line_number
        target: line_number
      - source: product_name
        target: product
      - source: qty
        target: quantity

tests:
  - description: >
      The shop has lines [1: Widget, 2: Gadget].  The warehouse has
      lines [1: Industrial Widget, 3: Sprocket].  With elements: coalesce
      the warehouse (priority 1) wins the entire element set — only
      warehouse lines survive.  The shop's delta receives only the
      warehouse lines; the shop's line 2 (Gadget) is excluded.
    input:
      shop:
        - order_id: "ORD-001"
          lines:
            - { line_num: 1, item: "Widget", qty: 2 }
            - { line_num: 2, item: "Gadget", qty: 1 }
      warehouse_orders:
        - { order_number: "ORD-001" }
      warehouse_lines:
        - { line_id: "WL1", order_number: "ORD-001", line_number: 1, product_name: "Industrial Widget", qty: 3 }
        - { line_id: "WL3", order_number: "ORD-001", line_number: 3, product_name: "Sprocket", qty: 10 }
    expected:
      shop:
        updates:
          - order_id: "ORD-001"
            lines:
              - { line_num: 1, item: "Industrial Widget", qty: 3 }
              - { line_num: 3, item: "Sprocket", qty: 10 }
      warehouse_orders: {}
      warehouse_lines: {}
