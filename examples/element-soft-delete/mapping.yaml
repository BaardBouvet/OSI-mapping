version: "1.0"
description: >
  Cross-source element-level soft-delete for value lists.  Two CRM
  systems track contact tags as JSONB object arrays.  Each tag carries
  an optional removed_at timestamp.  The child mappings declare
  tombstone on removed_at, and the engine feeds tombstoned elements
  into the same DeletionFilter pipeline as derive_element_tombstones —
  excluding them from ALL sources' reconstructed arrays with
  deletion-wins semantics.  No removed_at in the target schema.

sources:
  crm_a:
    primary_key: id
  crm_b:
    primary_key: id

targets:
  contact:
    fields:
      email:
        strategy: identity
      name:
        strategy: coalesce

  tag_entry:
    fields:
      contact_ref:
        strategy: identity
        link_group: tag_id
      tag:
        strategy: identity
        link_group: tag_id
      tag_order:
        strategy: coalesce

mappings:
  - name: crm_a_contacts
    source: crm_a
    target: contact
    priority: 1
    fields:
      - source: email
        target: email
      - source: name
        target: name

  - name: crm_a_tags
    source: crm_a
    parent: crm_a_contacts
    array: tags
    parent_fields:
      parent_email: email
    target: tag_entry
    priority: 1
    tombstone:
      field: removed_at
      undelete_value: null
    fields:
      - source: parent_email
        target: contact_ref
        references: crm_a_contacts
      - source: tag
        target: tag
      - target: tag_order
        order: true

  - name: crm_b_contacts
    source: crm_b
    target: contact
    priority: 2
    fields:
      - source: email
        target: email
      - source: name
        target: name

  - name: crm_b_tags
    source: crm_b
    parent: crm_b_contacts
    array: tags
    parent_fields:
      parent_email: email
    target: tag_entry
    priority: 2
    tombstone:
      field: removed_at
      undelete_value: null
    fields:
      - source: parent_email
        target: contact_ref
        references: crm_b_contacts
      - source: tag
        target: tag
      - target: tag_order
        order: true

tests:
  - description: >
      CRM A soft-deletes the "churned" tag by setting removed_at.
      CRM B still has the tag without the marker.  The cross-source
      tombstone CTE detects the tombstoned element via the identity
      view and excludes "churned" from BOTH sources' reconstructed
      arrays — same deletion-wins semantics as derive_element_tombstones.
    input:
      crm_a:
        - id: "A1"
          email: "alice@example.com"
          name: "Alice"
          tags:
            - { tag: "vip" }
            - { tag: "churned", removed_at: "2026-01-15" }
      crm_b:
        - id: "B1"
          email: "alice@example.com"
          name: "Alice"
          tags:
            - { tag: "vip" }
            - { tag: "churned" }
    expected:
      crm_a:
        updates:
          - id: "A1"
            email: "alice@example.com"
            name: "Alice"
            tags:
              - { tag: "vip" }
      crm_b:
        updates:
          - id: "B1"
            email: "alice@example.com"
            name: "Alice"
            tags:
              - { tag: "vip" }
