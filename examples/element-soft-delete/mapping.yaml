version: "1.0"
description: >
  Element-level soft-delete for value lists.  Two CRM systems track
  contact tags as JSONB object arrays.  Each tag carries an optional
  removed_at timestamp that signals soft-deletion.  The child mappings
  declare a tombstone on removed_at so the engine automatically filters
  out soft-deleted elements from the reconstructed array — there is no
  need to model removed_at in the target.

  This is the recommended pattern for soft-deleting individual elements
  in value lists: promote scalar values to objects carrying lifecycle
  metadata and use tombstone to suppress deleted elements.

sources:
  crm_a:
    primary_key: id
  crm_b:
    primary_key: id

targets:
  contact:
    fields:
      email:
        strategy: identity
      name:
        strategy: coalesce

  tag_entry:
    fields:
      contact_ref:
        strategy: identity
        link_group: tag_id
      tag:
        strategy: identity
        link_group: tag_id
      tag_order:
        strategy: coalesce

mappings:
  - name: crm_a_contacts
    source: crm_a
    target: contact
    priority: 1
    fields:
      - source: email
        target: email
      - source: name
        target: name

  - name: crm_a_tags
    source: crm_a
    parent: crm_a_contacts
    array: tags
    parent_fields:
      parent_email: email
    target: tag_entry
    priority: 1
    tombstone:
      field: removed_at
      undelete_value: null
    fields:
      - source: parent_email
        target: contact_ref
        references: crm_a_contacts
      - source: tag
        target: tag
      - target: tag_order
        order: true

  - name: crm_b_contacts
    source: crm_b
    target: contact
    priority: 2
    fields:
      - source: email
        target: email
      - source: name
        target: name

  - name: crm_b_tags
    source: crm_b
    parent: crm_b_contacts
    array: tags
    parent_fields:
      parent_email: email
    target: tag_entry
    priority: 2
    tombstone:
      field: removed_at
      undelete_value: null
    fields:
      - source: parent_email
        target: contact_ref
        references: crm_b_contacts
      - source: tag
        target: tag
      - target: tag_order
        order: true

tests:
  - description: >
      CRM A soft-deletes the "churned" tag by setting removed_at.
      CRM B still has the tag without the marker.  The tombstone on
      the child mapping filters the soft-deleted element from CRM A's
      own reconstructed array.  CRM A's delta shows the tags without
      "churned".  CRM B sees no change — consistent with entity-level
      tombstone semantics (per-source suppression, not global deletion).
    input:
      crm_a:
        - id: "A1"
          email: "alice@example.com"
          name: "Alice"
          tags:
            - { tag: "vip" }
            - { tag: "churned", removed_at: "2026-01-15" }
      crm_b:
        - id: "B1"
          email: "alice@example.com"
          name: "Alice"
          tags:
            - { tag: "vip" }
            - { tag: "churned" }
    expected:
      crm_a:
        updates:
          - id: "A1"
            email: "alice@example.com"
            name: "Alice"
            tags:
              - { tag: "vip" }
