version: "1.0"
description: >
  Propagate hard-deleted entities via derive_tombstones.
  Two systems (CRM and ERP) synchronize customer records through the engine.
  When a customer is hard-deleted from ERP (row gone, no tombstone),
  derive_tombstones synthesizes is_deleted = TRUE for the absent entity.
  Resolution combines the signal via bool_or, and each consumer's
  reverse_filter determines the reaction.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: cust_id

targets:
  customer:
    fields:
      email:
        strategy: identity
      name:
        strategy: coalesce
      is_deleted:
        strategy: bool_or
        type: boolean

mappings:
  - name: crm_customers
    source: crm
    target: customer
    cluster_members: true
    reverse_filter: "is_deleted IS NOT TRUE"
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 1

  - name: erp_customers
    source: erp
    target: customer
    cluster_members: true
    derive_tombstones: is_deleted
    reverse_filter: "is_deleted IS NOT TRUE"
    fields:
      - source: email
        target: email
      - source: name
        target: name

tests:
  - description: >
      Alice exists in CRM but was hard-deleted from ERP.
      The cluster_members table records that erp_customers previously
      synced Alice. derive_tombstones synthesizes is_deleted = TRUE
      for Alice from ERP's perspective. Resolution bool_or combines
      the signal: is_deleted = TRUE. CRM's reverse_filter detects
      this and emits action = 'delete' — propagating the deletion.
    input:
      crm:
        - { id: "C1", email: "alice@example.com", name: "Alice" }
        - { id: "C2", email: "bob@example.com", name: "Bob" }
      erp:
        - { cust_id: "E2", email: "bob@example.com", name: "Bob" }
      _cluster_members_crm_customers:
        - { _cluster_id: "ent_alice", _src_id: "C1" }
        - { _cluster_id: "ent_bob", _src_id: "C2" }
      _cluster_members_erp_customers:
        - { _cluster_id: "ent_alice", _src_id: "E1" }
        - { _cluster_id: "ent_bob", _src_id: "E2" }
    expected:
      crm:
        deletes:
          - { email: "alice@example.com" }

  - description: >
      Bob is a new customer in CRM, never synced to ERP before.
      No cluster_members entry exists for Bob in erp_customers.
      The delta correctly emits 'insert' for ERP — this is a genuine
      first sync, not a re-insertion.
    input:
      crm:
        - { id: "C1", email: "bob@example.com", name: "Bob" }
      erp: []
      _cluster_members_crm_customers:
        - { _cluster_id: "ent_bob", _src_id: "C1" }
      _cluster_members_erp_customers: []
    expected:
      erp:
        inserts:
          - { _cluster_id: "crm_customers:C1", cust_id: null, email: "bob@example.com", name: "Bob" }
