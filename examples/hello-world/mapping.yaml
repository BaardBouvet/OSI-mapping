version: "1.0"
description: >
  Two systems, one shared contact, synced by email.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: id

targets:
  contact:
    fields:
      email: identity
      name: coalesce

mappings:
  - name: crm
    source: { dataset: crm }
    target: contact
    cluster_members: true
    sync: true
    reverse_filter: "name NOT LIKE 'X%'"
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 1

  - name: erp
    source: { dataset: erp }
    target: contact
    cluster_members: true
    sync: true
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 2

tests:
  - description: "Shared contact merges by email; CRM is noop (base matches resolved)"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
      erp:
        - { id: "100", email: "alice@example.com", name: "A. Smith" }
    expected:
      erp:
        updates:
          - { id: "100", email: "alice@example.com", name: "Alice" }

  - description: "CRM-only contact triggers insert into ERP; CRM rows are noops"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
        - { id: "2", email: "bob@example.com", name: "Bob" }
      erp:
        - { id: "100", email: "alice@example.com", name: "A. Smith" }
    expected:
      erp:
        updates:
          - { id: "100", email: "alice@example.com", name: "Alice" }
        inserts:
          - { _cluster_id: "crm:2", email: "bob@example.com", name: "Bob" }

  - description: "ERP-only contact triggers insert into CRM; existing CRM is noop"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
      erp:
        - { id: "100", email: "alice@example.com", name: "A. Smith" }
        - { id: "200", email: "carol@example.com", name: "Carol" }
    expected:
      crm:
        inserts:
          - { _cluster_id: "erp:200", email: "carol@example.com", name: "Carol", _base: null }
      erp:
        updates:
          - { id: "100", email: "alice@example.com", name: "Alice" }

  - description: "Self-merge: two CRM rows merge; only the changed row is an update"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
        - { id: "2", email: "alice@example.com", name: "Alice B" }
      erp:
        - { id: "100", email: "bob@example.com", name: "Bob" }
    expected:
      crm:
        updates:
          - { id: "1", email: "alice@example.com", name: "Alice B", _base: { email: "alice@example.com", name: "Alice" } }
      erp:
        inserts:
          - { _cluster_id: "crm:2", email: "alice@example.com", name: "Alice B" }

  - description: "Pre-linked via cluster_members: CRM is noop after merge"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
      erp:
        - { id: "100", email: null, name: "A. Smith" }
      _cluster_members_crm:
        - { _src_id: "1", _cluster_id: "guid-abc-123" }
      _cluster_members_erp:
        - { _src_id: "100", _cluster_id: "guid-abc-123" }
    expected:
      erp:
        updates:
          - { id: "100", email: "alice@example.com", name: "Alice" }

  - description: "Name starting with 'X' triggers delete for CRM with _base (reverse_filter)"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Xander" }
      erp:
        - { id: "100", email: "alice@example.com", name: "Xander" }
    expected:
      crm:
        deletes:
          - { id: "1", _base: { email: "alice@example.com", name: "Xander" } }
