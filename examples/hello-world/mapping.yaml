version: "1.0"
description: >
  Two systems, one shared contact, synced by email.
  The simplest possible mapping showing identity matching,
  conflict resolution, and bidirectional sync.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: id

targets:
  contact:
    fields:
      email: identity
      name: coalesce

mappings:
  - name: crm
    source: { dataset: crm }
    target: contact
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 1

  - name: erp
    source: { dataset: erp }
    target: contact
    fields:
      - source: contact_email
        target: email
      - source: contact_name
        target: name
        priority: 2

tests:
  - description: "Shared contact — CRM name wins (priority 1), ERP gets updated"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
      erp:
        - { id: "100", contact_email: "alice@example.com", contact_name: "A. Smith" }
    expected:
      erp:
        updates:
          - { id: "100", contact_email: "alice@example.com", contact_name: "Alice" }

  - description: "CRM-only contact triggers insert into ERP"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
        - { id: "2", email: "bob@example.com", name: "Bob" }
      erp:
        - { id: "100", contact_email: "alice@example.com", contact_name: "A. Smith" }
    expected:
      erp:
        updates:
          - { id: "100", contact_email: "alice@example.com", contact_name: "Alice" }
        inserts:
          - { _cluster_id: "crm:2", contact_email: "bob@example.com", contact_name: "Bob" }

  - description: "ERP-only contact triggers insert into CRM"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice" }
      erp:
        - { id: "100", contact_email: "alice@example.com", contact_name: "A. Smith" }
        - { id: "200", contact_email: "carol@example.com", contact_name: "Carol" }
    expected:
      crm:
        inserts:
          - { _cluster_id: "erp:200", email: "carol@example.com", name: "Carol", _base: null }
      erp:
        updates:
          - { id: "100", contact_email: "alice@example.com", contact_name: "Alice" }
