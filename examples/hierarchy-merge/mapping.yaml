version: "1.0"
description: >
  Merging project hierarchies of different depths: a simple PM system with
  2 levels (project → task) and an enterprise PM system with 3 levels
  (program → project → task). Projects and tasks merge across systems via
  identity resolution despite living at different structural depths. Overlapping
  fields (owner, status) propagate resolved values between systems.

sources:
  simple_pm:
    primary_key: id
  enterprise_pm:
    primary_key: id

targets:
  program:
    fields:
      program_name:
        strategy: identity
      sponsor:
        strategy: coalesce

  project:
    fields:
      project_name:
        strategy: identity
      owner:
        strategy: coalesce
      budget:
        strategy: coalesce
        type: numeric
      program_name:
        strategy: coalesce
        references: program

  task:
    fields:
      task_name:
        strategy: identity
      project_name:
        strategy: coalesce
        references: project
      status:
        strategy: coalesce
      hours:
        strategy: coalesce
        type: numeric
      assignee:
        strategy: coalesce
      priority:
        strategy: coalesce
        type: numeric

mappings:
  # ── Simple PM (2 levels: project → task) ───────────────
  - name: simple_projects
    source: simple_pm
    target: project
    fields:
      - source: project_name
        target: project_name
      - source: owner
        target: owner
        priority: 1

  - name: simple_tasks
    parent: simple_projects
    array: tasks
    parent_fields:
      parent_project: project_name
    target: task
    fields:
      - source: parent_project
        target: project_name
        references: simple_projects
      - source: name
        target: task_name
      - source: status
        target: status
        priority: 1
      - source: hours
        target: hours

  # ── Enterprise PM (3 levels: program → project → task) ─
  - name: enterprise_programs
    source: enterprise_pm
    target: program
    fields:
      - source: program_name
        target: program_name
      - source: sponsor
        target: sponsor

  - name: enterprise_projects
    parent: enterprise_programs
    array: projects
    parent_fields:
      parent_program: program_name
    target: project
    fields:
      - source: name
        target: project_name
      - source: budget
        target: budget
      - source: lead
        target: owner
        priority: 2
      - source: parent_program
        target: program_name
        references: enterprise_programs

  - name: enterprise_tasks
    parent: enterprise_projects
    array: tasks
    parent_fields:
      parent_project: name
    target: task
    fields:
      - source: parent_project
        target: project_name
        references: enterprise_projects
      - source: name
        target: task_name
      - source: status
        target: status
        priority: 2
      - source: assignee
        target: assignee
      - source: priority
        target: priority
      - source: hours
        target: hours
        priority: 1

tests:
  - description: "Bidirectional propagation — simple PM status wins, enterprise PM hours win"
    input:
      simple_pm:
        - id: "S1"
          project_name: "Website Redesign"
          owner: "Alice"
          tasks:
            - { name: "Design mockups", status: "done", hours: 8 }
            - { name: "Build frontend", status: "active", hours: 20 }
      enterprise_pm:
        - id: "E1"
          program_name: "Digital Transformation"
          sponsor: "VP Engineering"
          projects:
            - name: "Website Redesign"
              budget: 50000
              lead: "Unknown"
              tasks:
                - { name: "Design mockups", status: "pending", assignee: "Bob", priority: 1, hours: 12 }
                - { name: "Build frontend", status: "pending", assignee: "Carol", priority: 2, hours: 40 }
    expected:
      simple_pm:
        updates:
          - id: "S1"
            project_name: "Website Redesign"
            owner: "Alice"
            tasks:
              - { name: "Build frontend", status: "active", hours: 40 }
              - { name: "Design mockups", status: "done", hours: 12 }
      enterprise_pm:
        updates:
          - id: "E1"
            program_name: "Digital Transformation"
            sponsor: "VP Engineering"
            projects:
              - name: "Website Redesign"
                budget: 50000
                lead: "Alice"
                tasks:
                  - { name: "Build frontend", status: "active", assignee: "Carol", priority: 2, hours: 40 }
                  - { name: "Design mockups", status: "done", assignee: "Bob", priority: 1, hours: 12 }

  - description: "Enterprise PM has extra project and task — only shared project gets field updates"
    input:
      simple_pm:
        - id: "S1"
          project_name: "Website Redesign"
          owner: "Alice"
          tasks:
            - { name: "Design mockups", status: "done", hours: 8 }
      enterprise_pm:
        - id: "E1"
          program_name: "Digital Transformation"
          sponsor: "VP Engineering"
          projects:
            - name: "Website Redesign"
              budget: 50000
              lead: "Outdated"
              tasks:
                - { name: "Design mockups", status: "pending", assignee: "Bob", priority: 1, hours: 10 }
            - name: "Mobile App"
              budget: 30000
              lead: "Dave"
              tasks:
                - { name: "Build prototype", status: "active", assignee: "Dave", priority: 1, hours: 16 }
    expected:
      simple_pm:
        updates:
          - id: "S1"
            project_name: "Website Redesign"
            owner: "Alice"
            tasks:
              - { name: "Design mockups", status: "done", hours: 10 }
      enterprise_pm:
        updates:
          - id: "E1"
            program_name: "Digital Transformation"
            sponsor: "VP Engineering"
            projects:
              - name: "Mobile App"
                budget: 30000
                lead: "Dave"
                tasks:
                  - { name: "Build prototype", status: "active", assignee: "Dave", priority: 1, hours: 16 }
              - name: "Website Redesign"
                budget: 50000
                lead: "Alice"
                tasks:
                  - { name: "Design mockups", status: "done", assignee: "Bob", priority: 1, hours: 10 }

  - description: "Disjoint projects — no overlap, both systems noop"
    input:
      simple_pm:
        - id: "S1"
          project_name: "API Integration"
          owner: "Alice"
          tasks:
            - { name: "Write endpoints", status: "active", hours: 12 }
      enterprise_pm:
        - id: "E1"
          program_name: "Digital Transformation"
          sponsor: "VP Engineering"
          projects:
            - name: "Mobile App"
              budget: 30000
              lead: "Dave"
              tasks:
                - { name: "Build prototype", status: "active", assignee: "Dave", priority: 1, hours: 16 }
    expected: {}
