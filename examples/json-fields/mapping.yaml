version: "1.0"
description: >
  JSON sub-field extraction via source_path. CRM stores customer metadata as
  a JSONB column; individual sub-fields map to target fields for resolution.
  Demonstrates single-level, deep JSON paths, bracket-quoted keys for dotted
  JSON property names, array index access, plus a second flat source that
  merges via coalesce priority.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: cust_id

targets:
  customer:
    fields:
      email:
        strategy: identity
      tier:
        strategy: coalesce
      language:
        strategy: coalesce
      city:
        strategy: coalesce
      api_endpoint:
        strategy: coalesce
      primary_phone:
        strategy: coalesce
      contact_type:
        strategy: coalesce

mappings:
  - name: crm_customers
    source: crm
    target: customer
    fields:
      - source: email
        target: email
      - source_path: metadata.tier
        target: tier
      - source_path: metadata.language
        target: language
      - source_path: metadata.address.city
        target: city
      - source_path: "metadata.['api.endpoint']"
        target: api_endpoint
      - source_path: contacts[0].phone
        target: primary_phone
      - source_path: contacts[0].type
        target: contact_type

  - name: erp_customers
    source: erp
    target: customer
    priority: 1
    fields:
      - source: email
        target: email
      - source: tier
        target: tier
      - source: city
        target: city

tests:
  - description: "Single CRM source — JSON sub-fields round-trip as noop (includes bracket key and array index)"
    input:
      crm:
        - id: "C1"
          email: "alice@example.com"
          metadata:
            tier: "gold"
            language: "en"
            address:
              city: "Oslo"
            "api.endpoint": "https://api.example.com/v1"
          contacts:
            - phone: "+4712345678"
              type: "mobile"
            - phone: "+4798765432"
              type: "work"
      erp: []
    expected:
      crm: {}
      erp:
        inserts:
          - email: "alice@example.com"
            city: "Oslo"
            tier: "gold"

  - description: "ERP overrides tier and city via priority — CRM gets updated"
    input:
      crm:
        - id: "C1"
          email: "alice@example.com"
          metadata:
            tier: "gold"
            language: "en"
            address:
              city: "Oslo"
            "api.endpoint": "https://api.example.com/v1"
          contacts:
            - phone: "+4712345678"
              type: "mobile"
      erp:
        - cust_id: "E1"
          email: "alice@example.com"
          tier: "platinum"
          city: "Bergen"
    expected:
      crm:
        updates:
          - id: "C1"
            email: "alice@example.com"
            metadata:
              tier: "platinum"
              language: "en"
              address:
                city: "Bergen"
              "api.endpoint": "https://api.example.com/v1"
            contacts:
              - phone: "+4712345678"
                type: "mobile"
