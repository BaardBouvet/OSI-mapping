version: "2.0"
description: >
  Two systems, one shared contact, name resolution by `last_modified`
  rather than priority. Demonstrates timestamp-based field winners
  across sources.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: id

targets:
  contact:
    identity:
      - email
    fields:
      email: { strategy: coalesce }
      name:  { strategy: last_modified }

mappings:
  - name: crm
    source: crm
    target: contact
    last_modified: updated_at
    fields:
      - { source: email, target: email }
      - { source: name,  target: name }

  - name: erp
    source: erp
    target: contact
    last_modified: modified
    fields:
      - { source: contact_email, target: email }
      - { source: contact_name,  target: name }

tests:
  - description: "Newer ERP timestamp wins"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice", updated_at: "2024-01-01T10:00:00Z" }
      erp:
        - { id: "100", contact_email: "alice@example.com", contact_name: "Alice Smith", modified: "2024-06-01T12:00:00Z" }
    expected:
      crm:
        updates:
          - { id: "1", email: "alice@example.com", name: "Alice Smith" }

  - description: "Newer CRM timestamp wins"
    input:
      crm:
        - { id: "1", email: "alice@example.com", name: "Alice Cooper", updated_at: "2024-12-01T10:00:00Z" }
      erp:
        - { id: "100", contact_email: "alice@example.com", contact_name: "Alice Smith", modified: "2024-06-01T12:00:00Z" }
    expected:
      erp:
        updates:
          - { id: "100", contact_email: "alice@example.com", contact_name: "Alice Cooper" }
