# yaml-language-server: $schema=../specs/osi-mapping-schema.json

# Source A: ERP companies → canonical company
# Only customers are sent back to the ERP (filter_reverse).
# Demonstrates: id, priority, timestamp_field, filter_reverse

version: "1.0"

mappings:
  - name: companies_to_company
    description: ERP companies to canonical company model
    id: id
    filter_reverse:
      dialects:
        - dialect: ANSI_SQL
          expression: "'customer' = ANY(role)"

    source:
      semantic_model: erp_model
      dataset: companies
      model_file: ./model-erp.yaml

    target:
      semantic_model: acme_inc_model
      dataset: company
      model_file: ./model-acme.yaml

    field_mappings:
      - target_field: email
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_email

      - target_field: name
        timestamp_field: modified_at
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_name
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: name

      - target_field: account
        priority: 2
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_account
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: account

      - target_field: role
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: "'customer'"
