# yaml-language-server: $schema=../../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: acme_inc_model
    description: Acme Inc canonical company model — merge target

    datasets:
      - name: company
        source: canonical.public.company
        primary_key: [company_id]
        unique_keys:
          - [company_id]
        description: Merged company entity from multiple sources

        fields:
          - name: company_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_id
            description: Canonical company identifier (generated by tooling)

          - name: email
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: email
            description: Contact email addresses (array after COLLECT)

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            description: Company name (LAST_MODIFIED wins)

          - name: account
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: account
            description: Account number (COALESCE by priority)

    relationships: []
    metrics: []
