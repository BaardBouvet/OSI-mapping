# yaml-language-server: $schema=../../specs/osi-mapping-schema.json

# Source A: ERP companies → canonical company
# Demonstrates optional resolution fields: id, priority, timestamp_field

version: "1.0"

mappings:
  - name: companies_to_company
    description: ERP companies to canonical company model
    id: id

    source:
      semantic_model: erp_model
      dataset: companies
      model_file: ./erp_model.yaml

    target:
      semantic_model: acme_inc_model
      dataset: company
      model_file: ./acme_inc_semantic_model.yaml

    field_mappings:
      - target_field: email
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_email

      - target_field: name
        timestamp_field: modified_at
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_name

      - target_field: account
        priority: 2
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_account
