# yaml-language-server: $schema=../../specs/osi-resolution-schema.json

# Resolution rules for the company dataset.
# Declares the target's policy — knows nothing about which mappings exist.
#
# Resolution behavior:
#   email   — COLLECT with link: true → all values retained as array, used for entity linking
#   name    — LAST_MODIFIED → each mapping's timestamp_field determines the winner
#   account — COALESCE → each mapping's priority determines the winner (lowest wins)

version: "1.0"

resolution:
  name: company_resolution
  description: Resolution rules for the company dataset

  target:
    semantic_model: acme_inc_model
    dataset: company
    model_file: ./acme_inc_semantic_model.yaml

  fields:
    email:
      strategy:
        type: COLLECT
        link: true

    name:
      strategy:
        type: LAST_MODIFIED

    account:
      strategy:
        type: COALESCE
