# yaml-language-server: $schema=../../specs/osi-mapping-schema.json

# Source B: CRM customers → canonical company
# Demonstrates optional resolution fields: id, priority, timestamp_field

version: "1.0"

mappings:
  - name: customers_to_company
    description: CRM customers to canonical company model
    id: id

    source:
      semantic_model: crm_model
      dataset: customers
      model_file: ./crm_model.yaml

    target:
      semantic_model: acme_inc_model
      dataset: company
      model_file: ./acme_inc_semantic_model.yaml

    field_mappings:
      - target_field: email
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: customer_email

      - target_field: name
        timestamp_field: last_updated
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: customer_name

      - target_field: account
        priority: 1
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: customer_account
