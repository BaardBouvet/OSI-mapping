# yaml-language-server: $schema=../../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: acme_inc_model
    description: Minimal Acme Inc semantic model

    datasets:
      - name: company
        source: canonical.public.company
        primary_key: [company_id]
        unique_keys:
          - [company_id]
          - [organization_number]
        description: Minimal company dataset for Acme Inc

        fields:
          - name: company_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_id
            description: Canonical company identifier

          - name: company_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: company_name
            description: Official company name

          - name: organization_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: organization_number
            description: Registration or tax identifier

          - name: industry
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: industry
            description: Company industry/sector

          - name: status
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: status
            description: Company status (active/inactive)

    relationships: []
    metrics: []
