version: "1.0"
description: >
  The simplest possible configuration showing basic data consolidation from two
  sources. Records with the same email merge. Each field uses a different resolution
  strategy to illustrate the core concepts.

sources:
  companies:
    primary_key: id
  customers:
    primary_key: id

targets:
  company:
    fields:
      email: identity
      name:
        strategy: last_modified
      account:
        strategy: coalesce

mappings:
  - name: companies
    source: { dataset: companies }
    target: company
    fields:
      - source: company_email
        target: email
      - source: company_name
        target: name
        last_modified: modified_at
      - source: company_account
        target: account
        priority: 2

  - name: customers
    source: { dataset: customers }
    target: company
    fields:
      - source: customer_email
        target: email
      - source: customer_name
        target: name
        last_modified: last_updated
      - source: customer_account
        target: account
        priority: 1

tests:
  - description: "Basic merge — two sources share email, coalesce picks priority 1"
    input:
      companies:
        - { id: "C1", company_email: "acme@example.org", company_name: "Acme Inc", company_account: "A12", modified_at: "2024-06-02T12:00:00Z" }
      customers:
        - { id: "CU1", customer_email: "acme@example.org", customer_name: "Acme", customer_account: "A12345", last_updated: "2024-06-01T12:00:00Z" }
    expected:
      companies:
        updates:
          - { id: "C1", company_email: "acme@example.org", company_name: "Acme Inc", company_account: "A12345" }
      customers:
        updates:
          - { id: "CU1", customer_email: "acme@example.org", customer_name: "Acme Inc", customer_account: "A12345" }

  - description: "Overlapping test — same account triggers merge"
    input:
      companies:
        - { id: "C2", company_account: "A12345", company_email: "test2@example.com", company_name: "Test2 Company", modified_at: "2024-12-01T12:00:00Z" }
      customers:
        - { id: "CU2", customer_account: "A12345", customer_email: "test2-customer@example.com", customer_name: "Test2 Customer", last_updated: "2024-12-01T12:00:00Z" }
    expected:
      companies:
        updates:
          - { id: "C2", company_account: "A12345", company_email: "test2@example.com", company_name: "Test2 Company" }
        inserts:
          - { _cluster_id: "customers:CU2", company_email: "test2-customer@example.com", company_account: "A12345", company_name: "Test2 Customer" }
      customers:
        updates:
          - { id: "CU2", customer_account: "A12345", customer_email: "test2-customer@example.com", customer_name: "Test2 Customer" }
        inserts:
          - { _cluster_id: "companies:C2", customer_email: "test2@example.com", customer_account: "A12345", customer_name: "Test2 Company" }
