# yaml-language-server: $schema=../../specs/osi-mapping-schema.json

version: "1.0"

mappings:
  - name: openapi_company_to_osi_company
    description: Minimal mapping from OpenAPI Company schema to Acme Inc OSI model

    source:
      schema_file: ./company-api-openapi.yaml
      schema_path: "#/components/schemas/Company"
      schema_format: openapi

    target:
      semantic_model: acme_inc_model
      dataset: company
      model_file: ./acme_inc_semantic_model.yaml

    field_mappings:
      - target_field: company_id
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: id
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_id

      - target_field: company_name
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: name
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_name

      - target_field: organization_number
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: taxId
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: organization_number

      - target_field: industry
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: industry
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: industry

      - target_field: status
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CASE WHEN active THEN 'active' ELSE 'inactive' END
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CASE WHEN status = 'active' THEN true ELSE false END
