version: "1.0"
description: >
  Single source with billing and shipping address fields, each mapping to a
  separate embedded address target. Shows multiple embedded mappings from one dataset.

sources:
  customers:
    primary_key: customer_id

targets:
  customer:
    fields:
      customer_id:
        strategy: identity
      name:
        strategy: coalesce

  address:
    fields:
      street:
        strategy: coalesce
      city:
        strategy: coalesce
      state:
        strategy: coalesce
      zip:
        strategy: coalesce
      country:
        strategy: coalesce

mappings:
  - name: customers
    source: customers
    target: customer
    fields:
      - source: customer_id
        target: customer_id
      - source: name
        target: name

  - name: customers_billing
    parent: customers
    target: address
    fields:
      - source: billing_street
        target: street
      - source: billing_city
        target: city
      - source: billing_state
        target: state
      - source: billing_zip
        target: zip
      - source: billing_country
        target: country

  - name: customers_shipping
    parent: customers
    target: address
    fields:
      - source: shipping_street
        target: street
      - source: shipping_city
        target: city
      - source: shipping_state
        target: state
      - source: shipping_zip
        target: zip
      - source: shipping_country
        target: country

tests:
  - description: "Billing and shipping addresses round-trip through separate embedded targets"
    input:
      customers:
        - customer_id: "C1"
          name: "Acme Corp"
          billing_street: "100 Main St"
          billing_city: "Boston"
          billing_state: "MA"
          billing_zip: "02101"
          billing_country: "US"
          shipping_street: "200 Oak Ave"
          shipping_city: "Cambridge"
          shipping_state: "MA"
          shipping_zip: "02139"
          shipping_country: "US"
    expected:
      # Single source — all fields round-trip unchanged
      customers: {}
