version: "1.0"
description: >
  Multiple independent nested branches from one root. Organization has departments
  (with employees) and projects (with tasks) — five targets total.
  Includes flat HR and PM sources to test cross-source merging into both branches.

sources:
  source:
    primary_key: id
  hr_departments:
    primary_key: did
  hr_employees:
    primary_key: eid

targets:
  organization:
    fields:
      org_id:
        strategy: identity
      name:
        strategy: coalesce
      country:
        strategy: coalesce

  department:
    fields:
      dept_id:
        strategy: identity
      org_ref:
        strategy: coalesce
        references: organization
      dept_name:
        strategy: coalesce
      budget:
        strategy: coalesce
        type: numeric

  employee:
    fields:
      emp_id:
        strategy: identity
      dept_ref:
        strategy: coalesce
        references: department
      emp_name:
        strategy: coalesce
      salary:
        strategy: coalesce
        type: numeric

  project:
    fields:
      proj_id:
        strategy: identity
      org_ref:
        strategy: coalesce
        references: organization
      proj_name:
        strategy: coalesce
      status:
        strategy: coalesce

  task:
    fields:
      task_id:
        strategy: identity
      proj_ref:
        strategy: coalesce
        references: project
      task_name:
        strategy: coalesce
      priority:
        strategy: coalesce

mappings:
  - name: source_orgs
    source: source
    target: organization
    fields:
      - source: id
        target: org_id
      - source: name
        target: name
      - source: country
        target: country

  - name: source_departments
    parent: source_orgs
    array: departments
    parent_fields:
      org_id: id
    target: department
    fields:
      - source: dept_id
        target: dept_id
      - source: org_id
        target: org_ref
        references: source_orgs
      - source: dept_name
        target: dept_name
      - source: budget
        target: budget

  - name: source_employees
    parent: source_departments
    array: employees
    parent_fields:
      parent_dept_id: dept_id
    target: employee
    fields:
      - source: emp_id
        target: emp_id
      - source: parent_dept_id
        target: dept_ref
        references: source_departments
      - source: emp_name
        target: emp_name
      - source: salary
        target: salary

  - name: source_projects
    parent: source_orgs
    array: projects
    parent_fields:
      org_id: id
    target: project
    fields:
      - source: proj_id
        target: proj_id
      - source: org_id
        target: org_ref
        references: source_orgs
      - source: proj_name
        target: proj_name
      - source: status
        target: status

  - name: source_tasks
    parent: source_projects
    array: tasks
    parent_fields:
      parent_proj_id: proj_id
    target: task
    fields:
      - source: task_id
        target: task_id
      - source: parent_proj_id
        target: proj_ref
        references: source_projects
      - source: task_name
        target: task_name
      - source: priority
        target: priority

  # Flat HR sources
  - name: hr_departments
    source: hr_departments
    target: department
    fields:
      - source: dept_id
        target: dept_id
      - source: org_id
        target: org_ref
        references: source_orgs
      - source: dept_name
        target: dept_name
      - source: budget
        target: budget
        priority: 1

  - name: hr_employees
    source: hr_employees
    target: employee
    fields:
      - source: emp_id
        target: emp_id
      - source: dept_id
        target: dept_ref
        references: hr_departments
      - source: emp_name
        target: emp_name
      - source: salary
        target: salary
        priority: 1

tests:
  - description: "Organization with departments+employees and projects+tasks"
    input:
      source:
        - id: "org1"
          name: "Acme Corp"
          country: "USA"
          departments:
            - dept_id: "d1"
              dept_name: "Engineering"
              budget: 500000
              employees:
                - { emp_id: "e1", emp_name: "Alice", salary: 90000 }
                - { emp_id: "e2", emp_name: "Bob", salary: 85000 }
            - dept_id: "d2"
              dept_name: "Sales"
              budget: 300000
              employees:
                - { emp_id: "e3", emp_name: "Carol", salary: 75000 }
          projects:
            - proj_id: "p1"
              proj_name: "Product Launch"
              status: "active"
              tasks:
                - { task_id: "t1", task_name: "Design UI", priority: "high" }
                - { task_id: "t2", task_name: "Backend API", priority: "high" }
            - proj_id: "p2"
              proj_name: "Marketing Campaign"
              status: "planning"
              tasks:
                - { task_id: "t3", task_name: "Create Content", priority: "medium" }
      hr_departments: []
      hr_employees: []
    expected:
      # Single source — all nested branches round-trip unchanged
      source: {}
      hr_departments:
        inserts:
          - { budget: 500000, dept_id: "d1", dept_name: "Engineering", org_id: "org1" }
          - { budget: 300000, dept_id: "d2", dept_name: "Sales", org_id: "org1" }
      hr_employees:
        inserts:
          - { emp_id: "e1", emp_name: "Alice", salary: 90000 }
          - { emp_id: "e2", emp_name: "Bob", salary: 85000 }
          - { emp_id: "e3", emp_name: "Carol", salary: 75000 }

  - description: "HR system corrects salary via priority — nested source gets updated"
    input:
      source:
        - id: "org1"
          name: "Acme Corp"
          country: "USA"
          departments:
            - dept_id: "d1"
              dept_name: "Engineering"
              budget: 500000
              employees:
                - { emp_id: "e1", emp_name: "Alice", salary: 90000 }
          projects: []
      hr_departments:
        - { did: "HD1", dept_id: "d1", org_id: "org1", dept_name: "Engineering", budget: 600000 }
      hr_employees:
        - { eid: "HE1", emp_id: "e1", dept_id: "d1", emp_name: "Alice", salary: 120000 }
    expected:
      source:
        updates:
          - id: "org1"
            name: "Acme Corp"
            country: "USA"
            departments:
              - dept_id: "d1"
                dept_name: "Engineering"
                budget: 600000
                employees:
                  - { emp_id: "e1", emp_name: "Alice", salary: 120000 }
            projects: null
      hr_employees:
        updates:
          - { eid: "HE1", emp_id: "e1", dept_id: "HD1", emp_name: "Alice", salary: 120000 }
