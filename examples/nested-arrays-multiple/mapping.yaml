version: "1.0"
description: >
  Multiple independent nested branches from one root. Organization has departments
  (with employees) and projects (with tasks) — five targets total.

sources:
  source:
    primary_key: id

targets:
  organization:
    fields:
      org_id: identity
      name: coalesce
      country: coalesce

  department:
    fields:
      dept_id: identity
      org_ref:
        strategy: coalesce
        references: organization
      dept_name: coalesce
      budget: coalesce

  employee:
    fields:
      emp_id: identity
      dept_ref:
        strategy: coalesce
        references: department
      emp_name: coalesce
      salary: coalesce

  project:
    fields:
      proj_id: identity
      org_ref:
        strategy: coalesce
        references: organization
      proj_name: coalesce
      status: coalesce

  task:
    fields:
      task_id: identity
      proj_ref:
        strategy: coalesce
        references: project
      task_name: coalesce
      priority: coalesce

mappings:
  - name: source_orgs
    source: { dataset: source }
    target: organization
    fields:
      - source: id
        target: org_id
      - source: name
        target: name
      - source: country
        target: country

  - name: source_departments
    source:
      dataset: source
      path: departments
      parent_fields:
        org_id: id
    target: department
    fields:
      - source: dept_id
        target: dept_id
      - source: org_id
        target: org_ref
      - source: dept_name
        target: dept_name
      - source: budget
        target: budget

  - name: source_employees
    source:
      dataset: source
      path: departments.employees
      parent_fields:
        parent_dept_id: dept_id
    target: employee
    fields:
      - source: emp_id
        target: emp_id
      - source: parent_dept_id
        target: dept_ref
      - source: emp_name
        target: emp_name
      - source: salary
        target: salary

  - name: source_projects
    source:
      dataset: source
      path: projects
      parent_fields:
        org_id: id
    target: project
    fields:
      - source: proj_id
        target: proj_id
      - source: org_id
        target: org_ref
      - source: proj_name
        target: proj_name
      - source: status
        target: status

  - name: source_tasks
    source:
      dataset: source
      path: projects.tasks
      parent_fields:
        parent_proj_id: proj_id
    target: task
    fields:
      - source: task_id
        target: task_id
      - source: parent_proj_id
        target: proj_ref
      - source: task_name
        target: task_name
      - source: priority
        target: priority

tests:
  - description: "Organization with departments+employees and projects+tasks"
    input:
      source:
        - id: "org1"
          name: "Acme Corp"
          country: "USA"
          departments:
            - dept_id: "d1"
              dept_name: "Engineering"
              budget: 500000
              employees:
                - { emp_id: "e1", emp_name: "Alice", salary: 90000 }
                - { emp_id: "e2", emp_name: "Bob", salary: 85000 }
            - dept_id: "d2"
              dept_name: "Sales"
              budget: 300000
              employees:
                - { emp_id: "e3", emp_name: "Carol", salary: 75000 }
          projects:
            - proj_id: "p1"
              proj_name: "Product Launch"
              status: "active"
              tasks:
                - { task_id: "t1", task_name: "Design UI", priority: "high" }
                - { task_id: "t2", task_name: "Backend API", priority: "high" }
            - proj_id: "p2"
              proj_name: "Marketing Campaign"
              status: "planning"
              tasks:
                - { task_id: "t3", task_name: "Create Content", priority: "medium" }
    expected:
      source:
        updates:
          - id: "org1"
            name: "Acme Corp"
            country: "USA"
            departments:
              - dept_id: "d1"
                dept_name: "Engineering"
                budget: 500000
                employees:
                  - { emp_id: "e1", emp_name: "Alice", salary: 90000 }
                  - { emp_id: "e2", emp_name: "Bob", salary: 85000 }
              - dept_id: "d2"
                dept_name: "Sales"
                budget: 300000
                employees:
                  - { emp_id: "e3", emp_name: "Carol", salary: 75000 }
            projects:
              - proj_id: "p1"
                proj_name: "Product Launch"
                status: "active"
                tasks:
                  - { task_id: "t1", task_name: "Design UI", priority: "high" }
                  - { task_id: "t2", task_name: "Backend API", priority: "high" }
              - proj_id: "p2"
                proj_name: "Marketing Campaign"
                status: "planning"
                tasks:
                  - { task_id: "t3", task_name: "Create Content", priority: "medium" }
