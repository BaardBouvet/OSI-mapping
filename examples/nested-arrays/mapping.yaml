version: "1.0"
description: >
  One-to-many from nested (shop) and normalized (warehouse) sources mapping to
  the same target entities. Shows source.path for nested array extraction with
  parent_fields to import ancestor data.

sources:
  shop:
    primary_key: order_id
  warehouse_lines:
    primary_key: line_id
  warehouse_orders:
    primary_key: id

targets:
  purchase_order:
    fields:
      order_ref:
        strategy: identity
      total:
        strategy: coalesce

  order_line:
    fields:
      order_ref:
        strategy: coalesce
        references: purchase_order
      line_number:
        strategy: identity
      product:
        strategy: coalesce
      quantity:
        strategy: coalesce

mappings:
  # Shop: parent order
  - name: shop_orders
    source: { dataset: shop }
    target: purchase_order
    fields:
      - source: order_id
        target: order_ref
      - source: total
        target: total

  # Shop: nested line items extracted via source.path
  - name: shop_lines
    source:
      dataset: shop
      path: lines
      parent_fields:
        parent_order_id: order_id
    target: order_line
    fields:
      - source: parent_order_id
        target: order_ref
        references: shop_orders
      - source: line_num
        target: line_number
      - source: item
        target: product
      - source: qty
        target: quantity

  # Warehouse: normalized order table
  - name: warehouse_orders
    source: { dataset: warehouse_orders }
    target: purchase_order
    fields:
      - source: order_number
        target: order_ref
      - source: total_amount
        target: total
        priority: 1

  # Warehouse: normalized line items table
  - name: warehouse_lines
    source: { dataset: warehouse_lines }
    target: order_line
    fields:
      - source: order_number
        target: order_ref
        references: warehouse_orders
      - source: line_number
        target: line_number
      - source: product_name
        target: product
      - source: qty
        target: quantity

tests:
  - description: "Nested shop lines round-trip — single source, no merge"
    input:
      shop:
        - order_id: "ORD-001"
          total: 150.00
          lines:
            - { line_num: 1, item: "Widget", qty: 2 }
            - { line_num: 2, item: "Gadget", qty: 1 }
      warehouse_orders: []
      warehouse_lines: []
    expected:
      shop: {}

  - description: "Both sources share an order — warehouse total wins via priority"
    input:
      shop:
        - order_id: "ORD-001"
          total: 100.00
          lines:
            - { line_num: 1, item: "Widget", qty: 2 }
      warehouse_orders:
        - { id: "W1", order_number: "ORD-001", total_amount: 999.00 }
      warehouse_lines: []
    expected:
      shop:
        updates:
          - order_id: "ORD-001"
            total: "999"
            lines:
              - { line_num: "1", item: "Widget", qty: "2" }

