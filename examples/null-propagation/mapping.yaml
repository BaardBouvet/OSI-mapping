version: "1.0"
description: >
  Propagating intentional NULLs through resolution using existing expression
  features — no engine changes needed. CRM is authoritative for phone numbers;
  when CRM clears a phone (sets it to NULL while updated_at is recent), that
  "cleared" state should win resolution over ERP's stale copy.

  The trick: use expression to convert authoritative NULLs to a sentinel value
  ('__CLEARED__') that survives the FILTER (WHERE field IS NOT NULL) in
  coalesce resolution. Then reverse_expression converts the sentinel back to
  NULL before writing to the source.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: emp_id

targets:
  contact:
    fields:
      email:
        strategy: identity
      phone:
        strategy: coalesce
      name:
        strategy: coalesce

mappings:
  # CRM is authoritative (priority 1). When phone is NULL, substitute a
  # sentinel so coalesce doesn't skip it.
  - name: crm_contacts
    source: crm
    target: contact
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 1
      - source: phone
        target: phone
        priority: 1
        expression: "COALESCE(phone, '__CLEARED__')"
        reverse_expression: "NULLIF(phone, '__CLEARED__')"

  # ERP is lower priority. No sentinel — NULL just means "don't know".
  - name: erp_contacts
    source: erp
    target: contact
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 2
      - source: phone
        target: phone
        priority: 2
        reverse_expression: "NULLIF(phone, '__CLEARED__')"

tests:
  - description: "CRM null phone wins over ERP stale phone"
    input:
      crm:
        - { id: "C1", email: "alice@example.com", name: "Alice", phone: null }
      erp:
        - { emp_id: "E1", email: "alice@example.com", name: "Alice E", phone: "555-1234" }
    expected:
      erp:
        updates:
          - { emp_id: "E1", email: "alice@example.com", name: "Alice", phone: null }

  - description: "CRM has phone — normal coalesce, CRM wins by priority"
    input:
      crm:
        - { id: "C1", email: "bob@example.com", name: "Bob", phone: "555-5678" }
      erp:
        - { emp_id: "E1", email: "bob@example.com", name: "Bob E", phone: "555-9999" }
    expected:
      erp:
        updates:
          - { emp_id: "E1", email: "bob@example.com", name: "Bob", phone: "555-5678" }

  - description: "ERP null phone does NOT win — CRM value used"
    input:
      crm:
        - { id: "C1", email: "carol@example.com", name: "Carol", phone: "555-1111" }
      erp:
        - { emp_id: "E1", email: "carol@example.com", name: "Carol E", phone: null }
    expected:
      erp:
        updates:
          - { emp_id: "E1", email: "carol@example.com", name: "Carol", phone: "555-1111" }

  - description: "Both null — resolved is null (sentinel from CRM, nothing from ERP)"
    input:
      crm:
        - { id: "C1", email: "dave@example.com", name: "Dave", phone: null }
      erp:
        - { emp_id: "E1", email: "dave@example.com", name: "Dave E", phone: null }
    expected:
      erp:
        updates:
          - { emp_id: "E1", email: "dave@example.com", name: "Dave", phone: null }
