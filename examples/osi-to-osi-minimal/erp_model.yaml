# yaml-language-server: $schema=../../specs/osi-schema.json

version: "1.0"

semantic_model:
  - name: erp_model
    description: ERP system data model (Norwegian column naming)

    datasets:
      - name: firma
        source: erp.dbo.firma
        primary_key: [firma_id]
        unique_keys:
          - [firma_id]
        description: Company master data from the ERP system

        fields:
          - name: firma_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: firma_id
            description: Auto-increment primary key

          - name: firmanavn
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: firmanavn
            description: Company name

          - name: org_nr
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: org_nr
            description: Organization number (integer)

          - name: bransje
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bransje
            description: Industry/sector

          - name: aktiv
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aktiv
            description: Active flag (boolean)

    relationships: []
    metrics: []
