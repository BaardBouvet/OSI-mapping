# yaml-language-server: $schema=../../specs/osi-mapping-schema.json

version: "1.0"

mappings:
  - name: erp_firma_to_company
    description: Minimal mapping from ERP firma to Acme Inc semantic model

    source:
      semantic_model: erp_model
      dataset: firma
      model_file: ./erp_model.yaml

    target:
      semantic_model: acme_inc_model
      dataset: company
      model_file: ./acme_inc_semantic_model.yaml

    field_mappings:
      - target_field: company_id
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CAST(firma_id AS VARCHAR)
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CAST(company_id AS INTEGER)

      - target_field: company_name
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: firmanavn
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: company_name

      - target_field: organization_number
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CAST(org_nr AS VARCHAR)
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CAST(organization_number AS INTEGER)

      - target_field: industry
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: bransje
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: industry

      - target_field: status
        forward_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CASE WHEN aktiv THEN 'active' ELSE 'inactive' END
        reverse_expression:
          dialects:
            - dialect: ANSI_SQL
              expression: CASE WHEN status = 'active' THEN true ELSE false END
