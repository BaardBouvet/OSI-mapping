version: "1.0"
description: >
  Passthrough fields carry source columns through to delta output
  without mapping them to target fields. Changes to passthrough-only
  fields don't trigger updates — the golden record is unchanged.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: id

targets:
  contact:
    fields:
      email:
        strategy: identity
      name:
        strategy: coalesce

mappings:
  - name: crm_contacts
    source: crm
    target: contact
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 1

  - name: erp_contacts
    source: erp
    target: contact
    passthrough:
      - record_type
      - region_code
    fields:
      - source: contact_email
        target: email
      - source: contact_name
        target: name
        priority: 2

tests:
  - description: "Passthrough fields appear in delta for ERP alongside resolved name from CRM"
    input:
      crm:
        - { id: "1", email: "a@x.com", name: "Alice" }
      erp:
        - { id: "100", contact_email: "a@x.com", contact_name: "A. Smith", record_type: "person", region_code: "EU" }
    expected:
      erp:
        updates:
          - { id: "100", contact_email: "a@x.com", contact_name: "Alice", record_type: "person", region_code: "EU" }
