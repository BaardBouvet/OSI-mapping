version: "1.0"
description: >
  GDPR-style deletion propagation. CRM has a soft-delete marker (deleted_at).
  The deletion signal is mapped to a regular bool_or target field (is_deleted),
  which flows through resolution to all systems. Each system's reverse_filter
  decides whether to act on it.

sources:
  crm:
    primary_key: id
  erp:
    primary_key: cust_id

targets:
  customer:
    fields:
      email:
        strategy: identity
      name:
        strategy: coalesce
      tier:
        strategy: coalesce
      is_deleted:
        strategy: bool_or

mappings:
  - name: crm_customers
    source: { dataset: crm }
    target: customer
    fields:
      - source: email
        target: email
      - source: name
        target: name
        priority: 1
      - expression: "deleted_at IS NOT NULL"
        target: is_deleted

  - name: erp_customers
    source: { dataset: erp }
    target: customer
    reverse_filter: "is_deleted IS NOT TRUE"
    fields:
      - source: email
        target: email
      - source: tier
        target: tier
        priority: 1

tests:
  - description: "Soft-delete in CRM propagates as delete to ERP"
    input:
      crm:
        - { id: "C1", email: "alice@example.com", name: "Alice", deleted_at: "2026-03-15" }
        - { id: "C2", email: "bob@example.com", name: "Bob", deleted_at: null }
      erp:
        - { cust_id: "E1", email: "alice@example.com", tier: "gold" }
        - { cust_id: "E2", email: "bob@example.com", tier: "silver" }
    expected:
      erp:
        deletes:
          - { cust_id: "E1" }

  - description: "No deletions — all records are noop"
    input:
      crm:
        - { id: "C1", email: "alice@example.com", name: "Alice", deleted_at: null }
        - { id: "C2", email: "bob@example.com", name: "Bob", deleted_at: null }
      erp:
        - { cust_id: "E1", email: "alice@example.com", tier: "gold" }
        - { cust_id: "E2", email: "bob@example.com", tier: "silver" }
    expected: {}

  - description: "Delete propagates even when CRM is not the only source"
    input:
      crm:
        - { id: "C1", email: "alice@example.com", name: "Alice", deleted_at: "2026-03-15" }
      erp:
        - { cust_id: "E1", email: "alice@example.com", tier: "gold" }
    expected:
      erp:
        deletes:
          - { cust_id: "E1" }
