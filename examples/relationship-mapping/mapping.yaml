version: "1.0"
description: >
  Maps many-to-many (CRM associations) to one-to-many (ERP foreign keys) through
  shared target entities. Uses embedded mappings and link_groups for association merging.

sources:
  crm_associations:
    primary_key: [company_id, contact_id, relation_type]
  crm_companies:
    primary_key: company_id
  crm_contacts:
    primary_key: contact_id
  erp_companies:
    primary_key: id
  erp_contacts:
    primary_key: id

targets:
  company:
    fields:
      name: last_modified
      email: identity

  person:
    fields:
      name: last_modified
      email: identity

  company_person_association:
    fields:
      company_id:
        strategy: coalesce
        references: company
      person_id:
        strategy: identity
        references: person
        link_group: relationship
      relation_type:
        strategy: identity
        link_group: relationship

mappings:
  # CRM: separate tables
  - name: crm_companies
    source: { dataset: crm_companies }
    target: company
    fields:
      - source: company_name
        target: name
        last_modified: updated_at
      - source: company_email
        target: email

  - name: crm_contacts
    source: { dataset: crm_contacts }
    target: person
    fields:
      - source: contact_name
        target: name
        last_modified: updated_at
      - source: contact_email
        target: email

  - name: crm_associations
    source: { dataset: crm_associations }
    target: company_person_association
    fields:
      - source: company_id
        target: company_id
      - source: contact_id
        target: person_id
      - source: relation_type
        target: relation_type

  # ERP: contacts with embedded company FK
  - name: erp_companies
    source: { dataset: erp_companies }
    target: company
    fields:
      - source: name
        target: name
        last_modified: modified_at
      - source: email
        target: email

  - name: erp_contacts_person
    source: { dataset: erp_contacts }
    target: person
    fields:
      - source: name
        target: name
        last_modified: modified_at
      - source: email
        target: email

  - name: erp_contacts_assoc
    source: { dataset: erp_contacts }
    target: company_person_association
    embedded: true
    filter: "relation_type = 'employee'"
    fields:
      - source: company_id
        target: company_id
        direction: forward_only
      - source: id
        target: person_id
        direction: forward_only
      - target: relation_type
        expression: "'employee'"
        direction: forward_only

tests:
  - description: "Many-to-many CRM + one-to-many ERP merge via shared targets"
    input:
      crm_companies:
        - { company_id: "C1", company_name: "Acme Corp", company_email: "info@acme.com", updated_at: "2024-01-15T10:00:00Z" }
        - { company_id: "C2", company_name: "TechStart", company_email: "hello@techstart.com", updated_at: "2024-01-15T10:00:00Z" }
      crm_contacts:
        - { contact_id: "P1", contact_name: "Alice Johnson", contact_email: "alice@example.com", updated_at: "2024-01-15T10:00:00Z" }
        - { contact_id: "P2", contact_name: "Bob Smith", contact_email: "bob@example.com", updated_at: "2024-01-15T10:00:00Z" }
      crm_associations:
        - { company_id: "C1", contact_id: "P1", relation_type: "decision_maker" }
        - { company_id: "C2", contact_id: "P1", relation_type: "consultant" }
        - { company_id: "C2", contact_id: "P2", relation_type: "employee" }
      erp_companies:
        - { id: "100", name: "Acme Corp", email: "info@acme.com", modified_at: "2024-01-10T10:00:00Z" }
      erp_contacts:
        - { id: "1001", name: "Charlie Brown", email: "charlie@example.com", company_id: "100", modified_at: "2024-01-10T10:00:00Z" }
    expected:
      crm_companies:
        updates:
          - { company_id: "C1", company_name: "Acme Corp", company_email: "info@acme.com" }
          - { company_id: "C2", company_name: "TechStart", company_email: "hello@techstart.com" }
      crm_contacts:
        updates:
          - { contact_id: "P1", contact_name: "Alice Johnson", contact_email: "alice@example.com" }
          - { contact_id: "P2", contact_name: "Bob Smith", contact_email: "bob@example.com" }
        inserts:
          - { _origin_erp_contacts_id: ["1001"], contact_name: "Charlie Brown", contact_email: "charlie@example.com" }
      crm_associations:
        updates:
          - { company_id: "C1", contact_id: "P1", relation_type: "decision_maker" }
          - { company_id: "C2", contact_id: "P1", relation_type: "consultant" }
          - { company_id: "C2", contact_id: "P2", relation_type: "employee" }
        inserts:
          - { _origin_erp_contacts_id: ["1001"], company_id: "C1", contact_id: null, relation_type: "employee" }
      erp_companies:
        updates:
          - { id: "100", name: "Acme Corp", email: "info@acme.com" }
        inserts:
          - { _origin_crm_companies_company_id: ["C2"], name: "TechStart", email: "hello@techstart.com" }
      erp_contacts:
        updates:
          - { id: "1001", name: "Charlie Brown", email: "charlie@example.com", company_id: "100" }
        inserts:
          - { _origin_crm_contacts_contact_id: ["P1"], name: "Alice Johnson", email: "alice@example.com", company_id: "100" }
          - { _origin_crm_contacts_contact_id: ["P1"], name: "Alice Johnson", email: "alice@example.com", company_id: null }
          - { _origin_crm_contacts_contact_id: ["P2"], name: "Bob Smith", email: "bob@example.com", company_id: null }
