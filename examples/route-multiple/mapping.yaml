version: "1.0"
description: >
  Single source with two mappings to the same target using different filters and
  priorities. Primary contacts get priority 1, secondary get priority 2.

sources:
  contacts:
    primary_key: id

targets:
  person:
    fields:
      email:
        strategy: coalesce
      name:
        strategy: coalesce
      phone:
        strategy: coalesce
      is_primary_contact:
        strategy: coalesce
        type: boolean

mappings:
  - name: contacts_primary
    source: { dataset: contacts }
    target: person
    filter: "is_primary = 'true'"
    reverse_filter: "is_primary_contact = true"
    fields:
      - source: email
        target: email
        priority: 1
      - source: contact_name
        target: name
        priority: 1
      - source: phone
        target: phone
        priority: 1
      - source: is_primary
        target: is_primary_contact
        expression: "true"

  - name: contacts_secondary
    source: { dataset: contacts }
    target: person
    filter: "is_primary = 'false'"
    reverse_filter: "is_primary_contact = false"
    fields:
      - source: email
        target: email
        priority: 2
      - source: contact_name
        target: name
        priority: 2
      - source: phone
        target: phone
        priority: 2
      - source: is_primary
        target: is_primary_contact
        expression: "false"

tests:
  - description: "Separate contacts round-trip unchanged"
    input:
      contacts:
        - { id: "C1", contact_name: "Alice Smith", email: "alice@example.com", phone: "555-0101", is_primary: "true" }
        - { id: "C2", contact_name: "Bob Jones", email: "bob@example.com", phone: "555-0102", is_primary: "false" }
    expected:
      # Each contact maps to its own person entity — no conflicts, all noops
      contacts: {}


