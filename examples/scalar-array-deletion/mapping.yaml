version: "1.0"
description: >
  Scalar array element deletion via child target and derive_tombstones.
  Two CRM systems store contact tags as bare scalar JSONB arrays
  (["vip", "churned"]).  Each source's tags are modelled as a child
  mapping to a separate tag_entry target, where the scalar value doubles
  as identity.  When CRM A removes a tag, the engine detects the absence
  via the parent's written_state and synthesizes is_removed = TRUE.
  The deletion propagates cross-source — CRM B's delta also excludes
  the removed tag.

sources:
  crm_a:
    primary_key: id
  crm_b:
    primary_key: id

targets:
  contact:
    fields:
      email: identity
      name: coalesce

  tag_entry:
    fields:
      contact_ref:
        strategy: identity
        link_group: tag_id
      tag:
        strategy: identity
        link_group: tag_id
      is_removed:
        strategy: bool_or
        type: boolean

mappings:
  - name: crm_a_contacts
    source: crm_a
    target: contact
    written_state: true
    derive_noop: true
    priority: 1
    fields:
      - source: email
        target: email
      - source: name
        target: name

  - name: crm_a_tags
    source: crm_a
    parent: crm_a_contacts
    array: tags
    parent_fields:
      parent_email: email
    target: tag_entry
    derive_tombstones: is_removed
    fields:
      - source: parent_email
        target: contact_ref
        references: crm_a_contacts
      - target: tag
        scalar: true

  - name: crm_b_contacts
    source: crm_b
    target: contact
    priority: 2
    fields:
      - source: email
        target: email
      - source: name
        target: name

  - name: crm_b_tags
    source: crm_b
    parent: crm_b_contacts
    array: tags
    parent_fields:
      parent_email: email
    target: tag_entry
    fields:
      - source: parent_email
        target: contact_ref
        references: crm_b_contacts
      - target: tag
        scalar: true

tests:
  - description: >
      CRM A previously had tags ["vip", "churned", "newsletter"] (recorded
      in written state) but now only has ["vip", "newsletter"] — it removed
      "churned".  CRM B still has ["vip", "churned"].  The engine detects
      CRM A's removal via written_state absence detection and synthesizes
      is_removed = TRUE for "churned".  The deletion propagates cross-source:
      CRM B's delta also drops "churned" from the reconstructed array.
    input:
      crm_a:
        - id: "A1"
          email: "alice@example.com"
          name: "Alice"
          tags: ["vip", "newsletter"]
      crm_b:
        - id: "B1"
          email: "alice@example.com"
          name: "Alice B"
          tags: ["vip", "churned"]
      _written_crm_a_contacts:
        - _cluster_id: "crm_a_contacts:A1"
          _written: '{"email": "alice@example.com", "name": "Alice", "tags": ["vip", "churned", "newsletter"]}'
    expected:
      crm_b:
        updates:
          - id: "B1"
            email: "alice@example.com"
            name: "Alice"
            tags:
              - "newsletter"
              - "vip"
