version: "1.0"
description: >
  Bidirectional value transformations between two systems with different data
  formats. Date format conversion, name splitting/joining, phone normalization.

sources:
  system_a:
    primary_key: person_id
  system_b:
    primary_key: user_id

targets:
  person:
    fields:
      email:
        strategy: identity
      date_of_birth:
        strategy: coalesce
        type: date
      first_name:
        strategy: coalesce
      last_name:
        strategy: coalesce
      phone:
        strategy: coalesce

mappings:
  - name: system_a
    source: { dataset: system_a }
    target: person
    priority: 1
    fields:
      - source: person_id
        target: email
      - source: dob
        target: date_of_birth
        expression: "TO_DATE(dob, 'DD/MM/YY')"
        reverse_expression: "TO_CHAR(date_of_birth, 'DD/MM/YY')"
      - source: first_name
        target: first_name
      - source: last_name
        target: last_name
      - source: phone_number
        target: phone
        expression: "REGEXP_REPLACE(phone_number, '[^0-9]', '')"
        reverse_expression: "'+' || SUBSTRING(phone, 1, 1) || ' ' || SUBSTRING(phone, 2, 3) || '-' || SUBSTRING(phone, 5)"

  - name: system_b
    source: { dataset: system_b }
    target: person
    priority: 2
    fields:
      - source: user_id
        target: email
      - source: birthdate
        target: date_of_birth
      - source: name
        target: first_name
        expression: "SPLIT_PART(name, ' ', 1)"
        reverse_expression: "first_name || ' ' || last_name"
      - source: name
        target: last_name
        expression: "SPLIT_PART(name, ' ', 2)"
        direction: forward_only
      - source: contact_phone
        target: phone

tests:
  - description: "System A wins (priority 1) — System B gets corrected values in B's format"
    input:
      system_a:
        - { person_id: "alice@example.com", dob: "15/06/85", first_name: "Alice", last_name: "Smith", phone_number: "+1 555-1234" }
      system_b:
        - { user_id: "alice@example.com", birthdate: "1985-06-15", name: "Alice Jones", contact_phone: "29998877" }
    expected:
      system_b:
        updates:
          # name and phone corrected to system_a's values (in system_b format)
          - { user_id: "alice@example.com", birthdate: "1985-06-15", name: "Alice Smith", contact_phone: "15551234" }
