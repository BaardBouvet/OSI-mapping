version: "1.0"
description: >
  Grouped name fields with default_expression to derive missing components.
  HR first+last wins via last_modified; CRM full_name is derived.

sources:
  crm:
    primary_key: contact_id
  hr:
    primary_key: employee_id

targets:
  person:
    fields:
      email: identity
      first_name:
        strategy: last_modified
        group: name
        default_expression: "SPLIT_PART(full_name, ' ', 1)"
      last_name:
        strategy: last_modified
        group: name
        default_expression: "SPLIT_PART(full_name, ' ', 2)"
      full_name:
        strategy: last_modified
        group: name
        default_expression: "first_name || ' ' || last_name"

mappings:
  - name: crm
    source: { dataset: crm }
    target: person
    fields:
      - source: contact_email
        target: email
      - source: contact_name
        target: full_name
        last_modified: updated_at

  - name: hr
    source: { dataset: hr }
    target: person
    fields:
      - source: employee_email
        target: email
      - source: first
        target: first_name
        last_modified: name_updated
      - source: last
        target: last_name
        last_modified: name_updated

tests:
  - description: "HR first+last wins (newer) — CRM gets derived full_name"
    input:
      crm:
        - { contact_id: "C1", contact_email: "alice@example.com", contact_name: "Alice Jones", updated_at: "2025-01-01T10:00:00Z" }
      hr:
        - { employee_id: "C1", employee_email: "alice@example.com", first: "Alice", last: "Smith", name_updated: "2025-01-15T10:00:00Z" }
    expected:
      crm:
        updates:
          - { contact_id: "C1", contact_email: "alice@example.com", contact_name: "Alice Smith" }
